# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "daily"
      time: "13:00"
      timezone: "UTC"
    # Limit the number of open pull requests to avoid overwhelming maintainers
    open-pull-requests-limit: 10
    # Set versioning strategy appropriate for a library/package
    versioning-strategy: "increase-if-necessary"
  # Android Gradle dependencies
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "android"
    commit-message:
      prefix: "chore(deps)"
  # iOS Swift Package Manager dependencies
  - package-ecosystem: "swift"
    directory: "/ios/XCTestService"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ios"
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: "swift"
    directory: "/ios/XCTestRunner"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ios"
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: "swift"
    directory: "/ios/XcodeCompanion"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ios"
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: "swift"
    directory: "/ios/XcodeExtension"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ios"
    commit-message:
      prefix: "chore(deps)"
