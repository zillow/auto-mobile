#file: noinspection YAMLSchemaValidation
name: "android-emulator-wtf"
description: "Run Android tests against emulator.wtf using an adb-connected session"
inputs:
  shell:
    description: "The shell to use for any steps that use shells"
    default: "bash"
    required: "true"
  script:
    description: "Script to execute once the emulator.wtf session is ready"
    example: './gradlew :junit-runner:test'
    required: "true"
  working-directory:
    description: "Working directory"
    default: "./"
    required: "true"
  max-time-limit:
    description: "Max emulator session time (e.g., 1m, 2m)"
    default: "1m"
    required: "true"
  device:
    description: "Optional device profile (e.g., model=Pixel2,version=34,gpu=auto)"
    default: ""
    required: "false"
  accessibility-apk-path:
    description: "Optional path to CtrlProxy APK to install before running the script"
    default: ""
    required: "false"

runs:
  using: "composite"
  steps:
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: "zulu"
        java-version: "21"

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.2.2

    - name: Cache emulator.wtf CLI
      id: cache-ew-cli
      uses: actions/cache@v5
      with:
        path: ~/bin/ew-cli
        key: ew-cli-v1

    - name: Install emulator.wtf CLI
      if: steps.cache-ew-cli.outputs.cache-hit != 'true'
      shell: ${{ inputs.shell }}
      run: |
        "${{ github.workspace }}/scripts/android/install-ew-cli.sh" \
          --install-dir "$HOME/bin" \
          --max-attempts 5 \
          --retry-delay 1

    - name: Add ew-cli to PATH and verify
      shell: ${{ inputs.shell }}
      run: |
        set -euo pipefail
        mkdir -p "$HOME/bin"
        echo "$HOME/bin" >> "$GITHUB_PATH"
        "$HOME/bin/ew-cli" --version

    - name: Start emulator.wtf session
      shell: ${{ inputs.shell }}
      env:
        EW_API_TOKEN: ${{ env.EW_API_TOKEN }}
      run: |
        device_args=""
        if [ -n "${{ inputs.device }}" ]; then
          device_args="--device ${{ inputs.device }}"
        fi
        "${{ github.workspace }}/scripts/android/start-emulator-wtf-session.sh" \
          --max-time-limit "${{ inputs.max-time-limit }}" \
          --session-log "$RUNNER_TEMP/emulator-wtf-session.log" \
          --env-file "$GITHUB_ENV" \
          --timeout 60 \
          --poll-interval 2 \
          $device_args

    - name: Run tests
      shell: ${{ inputs.shell }}
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ -n "${{ inputs.accessibility-apk-path }}" ]; then
          "${{ github.workspace }}/scripts/android/run-emulator-tests.sh" \
            "${{ inputs.accessibility-apk-path }}" \
            "${{ inputs.script }}"
        else
          eval "${{ inputs.script }}"
        fi

    - name: Stop emulator.wtf session
      if: always()
      shell: ${{ inputs.shell }}
      run: |
        "${{ github.workspace }}/scripts/android/stop-emulator-wtf-session.sh" \
          --log-lines 200
