#file: noinspection YAMLSchemaValidation
name: "android-emulator"
description: "Run Android Emulator with AVD snapshot caching for optimized CI performance"
inputs:
  shell:
    description: "The shell to use for any steps that use shells"
    default: "bash"
    required: "true"
  script:
    description: "Script to execute once Android Emulator is ready"
    example: './gradlew tests'
    required: "true"
  api_level:
    description: "Android API level"
    example: "35"
    default: "35"
    required: "true"
  arch:
    description: "CPU architecture"
    default: "x86_64"
    required: "true"
  target:
    description: "System image target"
    default: "google_apis"
    required: "true"
  working-directory:
    description: "Working directory"
    default: "./"
    required: "true"
  accessibility-apk-path:
    description: "Optional path to accessibility service APK to install before running the script"
    default: ""
    required: "false"
  gradle-home-directory:
    description: "The directory to use for Gradle User Home"
    default: ""
    required: "false"
  release-keystore-base64:
    description: "Base64 encoded release keystore for signing"
    required: false
    default: ""
  release-keystore-password:
    description: "Password for the release keystore"
    required: false
    default: ""
  release-key-alias:
    description: "Key alias in the release keystore"
    required: false
    default: ""
  release-key-password:
    description: "Password for the key in the release keystore"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: "zulu"
        java-version: "21"

    - name: Set Gradle User Home
      shell: ${{ inputs.shell }}
      run: |
        gradle_home="${{ inputs.gradle-home-directory }}"
        if [ -z "$gradle_home" ]; then
          gradle_home="$HOME/.gradle"
        fi
        gradle_home="${gradle_home/#\~/$HOME}"
        echo "GRADLE_USER_HOME=$gradle_home" >> $GITHUB_ENV
        echo "Using GRADLE_USER_HOME=$gradle_home"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Verify Java version
      shell: ${{ inputs.shell }}
      run: |
        java -version
        java -XshowSettings:properties -version 2>&1 | awk -F= '/java.specification.version/ {gsub(/ /,"",$2); if ($2+0 < 21) {print "Java 21+ is required"; exit 1}}'

    - name: Enable KVM group perms
      shell: ${{ inputs.shell }}
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Free disk space for emulator
      shell: ${{ inputs.shell }}
      run: |
        echo "Disk space before cleanup:"
        df -h

        # Remove large pre-installed tools that aren't needed
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost

        echo ""
        echo "Disk space after cleanup:"
        df -h

    - name: AVD cache
      uses: actions/cache@v4
      id: avd-cache
      with:
        path: |
          ~/.android/avd/*
          ~/.android/adb*
          /usr/local/lib/android/sdk/system-images/*
        key: avd-${{ runner.os }}-${{ inputs.api_level }}-${{ inputs.arch }}-${{ inputs.target }}
        restore-keys: |
          avd-${{ runner.os }}-${{ inputs.api_level }}-${{ inputs.arch }}-
          avd-${{ runner.os }}-${{ inputs.api_level }}-
          avd-${{ runner.os }}-

    - name: Create AVD and generate snapshot for caching
      if: steps.avd-cache.outputs.cache-hit != 'true'
      uses: reactivecircus/android-emulator-runner@v2.35.0
      with:
        api-level: ${{ inputs.api_level }}
        arch: ${{ inputs.arch }}
        target: ${{ inputs.target }}
        force-avd-creation: false
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: false
        script: |
          echo "=========================================="
          echo "AVD CREATION DEBUG"
          echo "=========================================="
          echo "Emulator version: $(emulator -version 2>/dev/null || echo 'unknown')"
          echo "Android SDK tools location: $ANDROID_HOME"
          ls -la "$ANDROID_HOME" 2>/dev/null || echo "ANDROID_HOME not found"
          echo "AVD directory: $ANDROID_AVD_HOME"
          ls -la "$ANDROID_AVD_HOME" 2>/dev/null || echo "ANDROID_AVD_HOME not found"
          echo ""
          echo "Generated AVD snapshot for caching."

    - name: Setup Release Keystore
      if: ${{ inputs.release-keystore-base64 != '' }}
      shell: ${{ inputs.shell }}
      working-directory: ${{ inputs.working-directory }}
      run: |
        mkdir -p keystore
        echo "${{ inputs.release-keystore-base64 }}" | base64 -d > keystore/release.keystore
        echo "RELEASE_KEYSTORE_PATH=keystore/release.keystore" >> $GITHUB_ENV
        echo "RELEASE_KEYSTORE_PASSWORD=${{ inputs.release-keystore-password }}" >> $GITHUB_ENV
        echo "RELEASE_KEY_ALIAS=${{ inputs.release-key-alias }}" >> $GITHUB_ENV
        echo "RELEASE_KEY_PASSWORD=${{ inputs.release-key-password }}" >> $GITHUB_ENV

    - name: Run Emulator
      uses: reactivecircus/android-emulator-runner@v2.35.0
      with:
        api-level: ${{ inputs.api_level }}
        arch: ${{ inputs.arch }}
        target: ${{ inputs.target }}
        script: ../scripts/android/run-emulator-tests.sh "${{ inputs.accessibility-apk-path }}" "${{ inputs.script }}"
        working-directory: ${{ inputs.working-directory }}
        force-avd-creation: false
        emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: false
