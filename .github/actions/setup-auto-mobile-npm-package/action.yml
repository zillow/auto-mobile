#file: noinspection YAMLSchemaValidation
name: "gradle-task-run"
description: ""
inputs:
  shell:
    description: "The shell to use for any steps that use shells"
    default: "bash"
    required: "true"

runs:
  using: "composite"
  steps:
    - name: "Setup Bun"
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.5

    - name: "Install ripgrep"
      shell: ${{ inputs.shell }}
      run: |
        if command -v rg >/dev/null 2>&1; then
          exit 0
        fi

        if command -v apt-get >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y ripgrep
          exit 0
        fi

        if command -v brew >/dev/null 2>&1; then
          brew install ripgrep
          exit 0
        fi

        if command -v choco >/dev/null 2>&1; then
          choco install ripgrep -y
          exit 0
        fi

        if command -v scoop >/dev/null 2>&1; then
          scoop install ripgrep
          exit 0
        fi

        if command -v winget >/dev/null 2>&1; then
          winget install --id BurntSushi.ripgrep -e --source winget
          exit 0
        fi

        echo "ripgrep not installed and no supported package manager found." >&2
        exit 1

    - name: "Install dependencies"
      shell: ${{ inputs.shell }}
      run: |
        bun install --frozen-lockfile || {
          bun pm cache rm
          bun install --frozen-lockfile
        }

    - name: "Build AutoMobile"
      shell: ${{ inputs.shell }}
      run: |
        bun run build

    - name: "Globally Install AutoMobile"
      shell: ${{ inputs.shell }}
      run: |
        if [[ "${RUNNER_OS:-}" == "Windows" ]]; then
          npm install -g .
          exit 0
        fi

        bun install -g .
        npm install -g .
