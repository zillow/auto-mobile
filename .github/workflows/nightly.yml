name: "Nightly"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-accessibility-service-sha256:
    name: "Update Accessibility Service SHA256"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":accessibility-service:assembleDebug"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: "Calculate APK SHA256"
        id: checksum
        run: |
          APK_PATH="accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk"
          SHA256=$(sha256sum "$APK_PATH" | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "APK SHA256: $SHA256"

      - name: "Get current SHA256 from source"
        id: current
        working-directory: ${{ github.workspace }}
        run: |
          CURRENT=$(grep 'APK_SHA256_CHECKSUM' src/constants/release.ts | sed 's/.*"\([^"]*\)".*/\1/')
          echo "sha256=$CURRENT" >> $GITHUB_OUTPUT
          echo "Source SHA256: ${CURRENT:-(empty)}"

      - name: "Check if SHA256 update needed"
        id: check
        run: |
          NEW="${{ steps.checksum.outputs.sha256 }}"
          OLD="${{ steps.current.outputs.sha256 }}"

          if [ "$NEW" = "$OLD" ]; then
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "SHA256 unchanged"
          else
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "SHA256 changed"
            echo "Previous: ${OLD:-(empty)}"
            echo "New:      $NEW"
          fi

      - name: "Update release.ts with new SHA256"
        if: steps.check.outputs.needed == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          NEW_SHA256="${{ steps.checksum.outputs.sha256 }}"

          sed -i "s/APK_SHA256_CHECKSUM: string = \".*\"/APK_SHA256_CHECKSUM: string = \"$NEW_SHA256\"/" \
            src/constants/release.ts

          echo "Updated src/constants/release.ts:"
          grep -A1 -B1 'APK_SHA256_CHECKSUM' src/constants/release.ts

      - name: "Create PR for SHA256 update"
        if: steps.check.outputs.needed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          # Use a PAT with workflow scope so the PR triggers CI runs.
          token: ${{ secrets.AUTO_MOBILE_PR_TOKEN }}
          commit-message: |
            chore: update accessibility service APK SHA256

            Previous: ${{ steps.current.outputs.sha256 || '(empty)' }}
            New: ${{ steps.checksum.outputs.sha256 }}
          title: "chore: update accessibility service APK SHA256"
          body: |
            ## Automated Checksum Update

            The accessibility service APK was rebuilt on `main` with a different SHA256 checksum.

            | | SHA256 |
            |--|--------|
            | **Previous** | `${{ steps.current.outputs.sha256 || '(empty)' }}` |
            | **New** | `${{ steps.checksum.outputs.sha256 }}` |

            ### Why did this happen?

            The SHA256 changes when any of these change:
            - Source code in `android/accessibility-service/src/`
            - Build configuration (`build.gradle.kts`)
            - Dependencies or SDK versions

            ### What to do

            1. Review this PR to ensure the change is expected
            2. Merge when ready
            3. Future releases will use this checksum for APK verification

            ---
            Auto-generated by `update-accessibility-service-sha256` workflow
          branch: auto-update/accessibility-service-apk-256
          delete-branch: true
          labels: |
            automated
            android
            release engineering

      - name: "Enable auto-merge on PR"
        if: steps.check.outputs.needed == 'true' && steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.AUTO_MOBILE_PR_TOKEN }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash
