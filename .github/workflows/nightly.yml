name: "Nightly"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  build-accessibility-service-apk:
    name: "Build Accessibility Service APK"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    outputs:
      sha256: ${{ steps.checksum.outputs.sha256 }}
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":accessibility-service:assembleDebug"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          release-keystore-base64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          release-keystore-password: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          release-key-alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          release-key-password: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: "Calculate APK SHA256"
        id: checksum
        run: |
          APK_PATH="accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk"
          SHA256=$(sha256sum "$APK_PATH" | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "APK SHA256: $SHA256"

      - name: "Copy APK to /tmp"
        run: cp accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk /tmp/accessibility-service-debug.apk

      - name: "Upload APK artifact"
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-service-apk
          path: /tmp/accessibility-service-debug.apk
          retention-days: 7

  build-xctestservice-ipa:
    name: "Build XCTestService IPA"
    runs-on: macos-15
    outputs:
      sha256: ${{ steps.build.outputs.ipa_sha256 }}
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Select Xcode 16.2"
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: "Install XcodeGen"
        run: brew install xcodegen

      - name: "Install xcpretty"
        run: gem install xcpretty

      - name: "Build XCTestService IPA"
        id: build
        run: ./scripts/ios/xctestservice-create-ipa.sh --output /tmp/XCTestService.ipa

      - name: "Upload IPA artifact"
        uses: actions/upload-artifact@v4
        with:
          name: xctestservice-ipa
          path: /tmp/XCTestService.ipa
          retention-days: 7

  update-sha256:
    name: "Update SHA256 Checksums"
    runs-on: ubuntu-latest
    needs: [build-accessibility-service-apk, build-xctestservice-ipa]
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Download APK artifact"
        uses: actions/download-artifact@v4
        with:
          name: accessibility-service-apk
          path: /tmp

      - name: "Download IPA artifact"
        uses: actions/download-artifact@v4
        with:
          name: xctestservice-ipa
          path: /tmp

      - name: "Verify APK SHA256"
        run: |
          EXPECTED="${{ needs.build-accessibility-service-apk.outputs.sha256 }}"
          ACTUAL=$(sha256sum /tmp/accessibility-service-debug.apk | cut -d' ' -f1)
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::APK SHA256 mismatch after download"
            exit 1
          fi

      - name: "Verify IPA SHA256"
        run: |
          EXPECTED="${{ needs.build-xctestservice-ipa.outputs.sha256 }}"
          ACTUAL=$(sha256sum /tmp/XCTestService.ipa | cut -d' ' -f1)
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::IPA SHA256 mismatch after download"
            exit 1
          fi

      - name: "Get current SHA256 values from source"
        id: current
        run: |
          APK_CURRENT=$(grep 'APK_SHA256_CHECKSUM' src/constants/release.ts | sed 's/.*"\([^"]*\)".*/\1/')
          IPA_CURRENT=$(grep 'XCTESTSERVICE_SHA256_CHECKSUM' src/constants/release.ts | sed 's/.*"\([^"]*\)".*/\1/')
          echo "apk_sha256=$APK_CURRENT" >> $GITHUB_OUTPUT
          echo "ipa_sha256=$IPA_CURRENT" >> $GITHUB_OUTPUT
          echo "Current APK SHA256: ${APK_CURRENT:-(empty)}"
          echo "Current IPA SHA256: ${IPA_CURRENT:-(empty)}"

      - name: "Check if updates needed"
        id: check
        run: |
          NEW_APK="${{ needs.build-accessibility-service-apk.outputs.sha256 }}"
          OLD_APK="${{ steps.current.outputs.apk_sha256 }}"
          NEW_IPA="${{ needs.build-xctestservice-ipa.outputs.sha256 }}"
          OLD_IPA="${{ steps.current.outputs.ipa_sha256 }}"

          APK_CHANGED="false"
          IPA_CHANGED="false"

          if [ "$NEW_APK" != "$OLD_APK" ]; then
            APK_CHANGED="true"
            echo "APK SHA256 changed"
            echo "  Previous: ${OLD_APK:-(empty)}"
            echo "  New:      $NEW_APK"
          else
            echo "APK SHA256 unchanged"
          fi

          if [ "$NEW_IPA" != "$OLD_IPA" ]; then
            IPA_CHANGED="true"
            echo "IPA SHA256 changed"
            echo "  Previous: ${OLD_IPA:-(empty)}"
            echo "  New:      $NEW_IPA"
          else
            echo "IPA SHA256 unchanged"
          fi

          echo "apk_changed=$APK_CHANGED" >> $GITHUB_OUTPUT
          echo "ipa_changed=$IPA_CHANGED" >> $GITHUB_OUTPUT

          if [ "$APK_CHANGED" = "true" ] || [ "$IPA_CHANGED" = "true" ]; then
            echo "needed=true" >> $GITHUB_OUTPUT
          else
            echo "needed=false" >> $GITHUB_OUTPUT
          fi

      - name: "Update release constants"
        if: steps.check.outputs.needed == 'true'
        env:
          APK_SHA256_CHECKSUM: ${{ needs.build-accessibility-service-apk.outputs.sha256 }}
          XCTESTSERVICE_SHA256_CHECKSUM: ${{ needs.build-xctestservice-ipa.outputs.sha256 }}
        run: bash scripts/generate-release-constants.sh

      - name: "Build PR title"
        if: steps.check.outputs.needed == 'true'
        id: pr-title
        run: |
          APK_CHANGED="${{ steps.check.outputs.apk_changed }}"
          IPA_CHANGED="${{ steps.check.outputs.ipa_changed }}"

          if [ "$APK_CHANGED" = "true" ] && [ "$IPA_CHANGED" = "true" ]; then
            echo "title=chore: update accessibility service APK and XCTestService IPA SHA256" >> $GITHUB_OUTPUT
          elif [ "$APK_CHANGED" = "true" ]; then
            echo "title=chore: update accessibility service APK SHA256" >> $GITHUB_OUTPUT
          else
            echo "title=chore: update XCTestService IPA SHA256" >> $GITHUB_OUTPUT
          fi

      - name: "Create PR for SHA256 update"
        if: steps.check.outputs.needed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.AUTO_MOBILE_PR_TOKEN }}
          commit-message: |
            ${{ steps.pr-title.outputs.title }}

            APK: ${{ steps.current.outputs.apk_sha256 || '(empty)' }} -> ${{ needs.build-accessibility-service-apk.outputs.sha256 }}${{ steps.check.outputs.apk_changed == 'true' && ' (changed)' || ' (unchanged)' }}
            IPA: ${{ steps.current.outputs.ipa_sha256 || '(empty)' }} -> ${{ needs.build-xctestservice-ipa.outputs.sha256 }}${{ steps.check.outputs.ipa_changed == 'true' && ' (changed)' || ' (unchanged)' }}
          title: ${{ steps.pr-title.outputs.title }}
          body: |
            ## Automated Checksum Update

            The nightly build produced artifacts with updated SHA256 checksums.

            | Artifact | Previous | New | Changed |
            |----------|----------|-----|---------|
            | **APK** | `${{ steps.current.outputs.apk_sha256 || '(empty)' }}` | `${{ needs.build-accessibility-service-apk.outputs.sha256 }}` | ${{ steps.check.outputs.apk_changed == 'true' && '✅ Yes' || 'No' }} |
            | **IPA** | `${{ steps.current.outputs.ipa_sha256 || '(empty)' }}` | `${{ needs.build-xctestservice-ipa.outputs.sha256 }}` | ${{ steps.check.outputs.ipa_changed == 'true' && '✅ Yes' || 'No' }} |

            ### Why did this happen?

            SHA256 checksums change when any of these change:
            - Source code in `android/accessibility-service/src/` or `ios/XCTestService/`
            - Build configuration (`build.gradle.kts` or `project.yml`)
            - Dependencies or SDK versions

            ### What to do

            1. Review this PR to ensure the changes are expected
            2. Merge when ready
            3. Future releases will use these checksums for artifact verification

            ---
            Auto-generated by the `nightly` workflow
          branch: auto-update/nightly-sha256
          delete-branch: true
          labels: |
            automated
            release engineering

      - name: "Enable auto-merge on PR"
        if: steps.check.outputs.needed == 'true' && steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.AUTO_MOBILE_PR_TOKEN }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash
