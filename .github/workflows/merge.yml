name: "On Merge"

on:
  push:
    branches:
      - main

permissions:
  checks: write
  security-events: write
  pull-requests: write
  contents: write
  packages: write

jobs:
  ide-plugin-validation:
    name: "IDE Plugin Validation"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Install JDK"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: "Validate IDE Plugin"
        run: scripts/ide-plugin/validate.sh

  validate-xml:
    name: "Validate XML"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Run XMLStarlet"
        shell: "bash"
        run: |
          sudo apt-get update
          sudo apt-get install xmlstarlet
          scripts/xml/validate_xml.sh

  ktfmt:
    name: "ktfmt"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Run ktfmt"
        shell: "bash"
        run: |
          INSTALL_KTFMT_WHEN_MISSING=true ONLY_TOUCHED_FILES=false scripts/ktfmt/validate_ktfmt.sh

  validate-shell-scripts:
    name: "Validate Shell Scripts"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Run ShellCheck"
        shell: "bash"
        run: |
          scripts/shellcheck/validate_shell_scripts.sh

  validate-mkdocs-nav:
    name: "Validate MkDocs Navigation"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Validate MkDocs Navigation"
        shell: "bash"
        run: |
          scripts/validate_mkdocs_nav.sh

  validate-documentation-links:
    name: "Validate Documentation Links"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Install Lychee"
        shell: "bash"
        run: |
          scripts/lychee/install_lychee.sh

      - name: "Validate Links"
        shell: "bash"
        run: |
          scripts/lychee/validate_lychee.sh

  mcp-build-and-test:
    name: "Node TypeScript Build and Test"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Run Lint"
        run: bun run lint

      - name: "Run Tests"
        run: bun run test

  junit-runner-unit-tests:
    name: "Run JUnit Runner Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      # Only run unit tests without Emulator
      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":junit-runner:test"
          gradle-project-directory: "android"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

  # Test isolation issue resolved in #107 and #109
  # Re-enabled in #110
  junit-runner-emulator-tests:
    name: "Run JUnit Runner Emulator Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-android-accessibility-service
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Download Accessibility Service APK"
        uses: actions/download-artifact@v4
        with:
          name: accessibility-service-apk
          path: android/accessibility-service/build/outputs/apk/debug

      # Run AutoMobile tests that require emulator
      - uses: ./.github/actions/android-emulator
        with:
          script: "./gradlew :junit-runner:test"
          working-directory: './android/'
          accessibility-apk-path: accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk

      - name: "Upload Test Results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-runner-emulator-test-results
          path: android/junit-runner/build/reports/tests/test/

      - name: "Publish Test Report"
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          check_name: "JUnit Runner Emulator Test Report"
          report_paths: '**/build/test-results/**/*.xml'

  playground-automobile-emulator-tests:
    name: "Run Playground Automobile Emulator Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-android-accessibility-service
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Download Accessibility Service APK"
        uses: actions/download-artifact@v4
        with:
          name: accessibility-service-apk
          path: android/accessibility-service/build/outputs/apk/debug

      # Run AutoMobile tests that require emulator
      - uses: ./.github/actions/android-emulator
        with:
          script: "./gradlew :playground:app:test --stacktrace"
          working-directory: './android/'
          accessibility-apk-path: accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk

      - name: "Upload Test Results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playground-automobile-emulator-test-results
          path: android/playground/app/build/reports/tests/test/

      - name: "Publish Test Report"
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          check_name: "Playground Automobile Emulator Test Report"
          report_paths: '**/build/test-results/**/*.xml'

  android-accessibility-service-unit-tests:
    name: "Run Accessibility Service Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":accessibility-service:testDebugUnitTest"
          gradle-project-directory: "android"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

  build-junit-runner-library:
    name: "Build JUnitRunner Library"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":junitRunner:assemble"
          gradle-project-directory: "android"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: "Store AAR"
        uses: actions/upload-artifact@v4.4.0
        with:
          name: aar
          path: core/build/outputs/aar/core-debug.aar

  build-android-accessibility-service:
    name: "Build Accessibility Service"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":accessibility-service:assembleDebug"
          gradle-project-directory: "android"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: "Store Accessibility Service APK"
        uses: actions/upload-artifact@v4.4.0
        with:
          name: accessibility-service-apk
          path: android/accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk

      - name: "Calculate APK SHA256"
        id: checksum
        run: |
          APK_PATH="accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk"
          SHA256=$(sha256sum "$APK_PATH" | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "APK SHA256: $SHA256"

      - name: "Get current SHA256 from source"
        id: current
        working-directory: ${{ github.workspace }}
        run: |
          CURRENT=$(grep 'APK_SHA256_CHECKSUM' src/constants/release.ts | sed 's/.*"\([^"]*\)".*/\1/')
          echo "sha256=$CURRENT" >> $GITHUB_OUTPUT
          echo "Source SHA256: ${CURRENT:-(empty)}"

      - name: "Check if SHA256 update needed"
        id: check
        run: |
          NEW="${{ steps.checksum.outputs.sha256 }}"
          OLD="${{ steps.current.outputs.sha256 }}"

          if [ "$NEW" = "$OLD" ]; then
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "SHA256 unchanged"
          else
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "SHA256 changed"
            echo "Previous: ${OLD:-(empty)}"
            echo "New:      $NEW"
          fi

      - name: "Update release.ts with new SHA256"
        if: steps.check.outputs.needed == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          NEW_SHA256="${{ steps.checksum.outputs.sha256 }}"

          sed -i "s/APK_SHA256_CHECKSUM: string = \".*\"/APK_SHA256_CHECKSUM: string = \"$NEW_SHA256\"/" \
            src/constants/release.ts

          echo "Updated src/constants/release.ts:"
          grep -A1 -B1 'APK_SHA256_CHECKSUM' src/constants/release.ts

      - name: "Create PR for SHA256 update"
        if: steps.check.outputs.needed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          # Use a PAT with workflow scope so the PR triggers CI runs.
          token: ${{ secrets.AUTO_MOBILE_PR_TOKEN }}
          commit-message: |
            chore: update accessibility service APK SHA256

            Previous: ${{ steps.current.outputs.sha256 || '(empty)' }}
            New: ${{ steps.checksum.outputs.sha256 }}
          title: "chore: update accessibility service APK SHA256"
          body: |
            ## Automated Checksum Update

            The accessibility service APK was rebuilt on `main` with a different SHA256 checksum.

            | | SHA256 |
            |--|--------|
            | **Previous** | `${{ steps.current.outputs.sha256 || '(empty)' }}` |
            | **New** | `${{ steps.checksum.outputs.sha256 }}` |

            ### Why did this happen?

            The SHA256 changes when any of these change:
            - Source code in `android/accessibility-service/src/`
            - Build configuration (`build.gradle.kts`)
            - Dependencies or SDK versions

            ### What to do

            1. Review this PR to ensure the change is expected
            2. Merge when ready
            3. Future releases will use this checksum for APK verification

            ---
            Auto-generated by `build-android-accessibility-service` job in merge workflow
          branch: auto-update/accessibility-service-apk-256
          delete-branch: true
          labels: |
            automated
            android
            release engineering

  build-playground-app:
    name: "Build Playground App"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":playground:app:assembleDebug"
          gradle-project-directory: "android"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: "Store Sample APK"
        uses: actions/upload-artifact@v4.4.0
        if: success()  # Only upload if build succeeded
        with:
          name: playground-app-apk
          path: android/playground/app/build/outputs/apk/debug/playground-app-debug.apk

