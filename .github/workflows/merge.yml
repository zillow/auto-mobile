  # =============================================================================
  # TypeScript Code Coverage
  # =============================================================================

  ts-code-coverage:
    name: "TypeScript Code Coverage"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Cache Turborepo"
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-ubuntu-latest-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: |
            turbo-ubuntu-latest-${{ hashFiles('bun.lock') }}-
            turbo-ubuntu-latest-

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Run Tests with Coverage"
        env:
          TURBO_TELEMETRY_DISABLED: "1"
          TURBO_NO_UPDATE_NOTIFIER: "1"
          DO_NOT_TRACK: "1"
          NO_COLOR: "1"
        run: turbo run test:coverage --output-logs=errors-only

      - name: "Generate Coverage Badge"
        run: bash scripts/coverage/generate-badge.sh coverage/lcov.info coverage/ts-coverage-badge.json "TS coverage" "3178C6"

      - name: "Upload Coverage Badge"
        uses: actions/upload-artifact@v6
        with:
          name: ts-coverage-badge
          path: coverage/ts-coverage-badge.json
          retention-days: 90

  # =============================================================================
  # Kotlin Code Coverage
  # =============================================================================

  kotlin-code-coverage:
    name: "Kotlin Code Coverage"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":junit-runner:test :junit-runner:jacocoTestReport :control-proxy:testDebugUnitTest :control-proxy:createDebugUnitTestCoverageReport :auto-mobile-sdk:testDebugUnitTest :auto-mobile-sdk:createDebugUnitTestCoverageReport :test-plan-validation:test :test-plan-validation:jacocoTestReport :protocol:test :protocol:jacocoTestReport"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: "Generate Kotlin Coverage Badge"
        run: bash scripts/coverage/generate-kotlin-badge.sh

      - name: "Upload Kotlin Coverage Badge"
        uses: actions/upload-artifact@v6
        with:
          name: kotlin-coverage-badge
          path: coverage/kotlin-coverage-badge.json
          retention-days: 90

  # =============================================================================
  # Swift Code Coverage
  # =============================================================================

  swift-code-coverage:
    name: "Swift Code Coverage"
    runs-on: macos-14
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Select Xcode 15.4"
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: "Generate Swift Coverage Badge"
        run: bash scripts/coverage/generate-swift-coverage.sh

      - name: "Upload Swift Coverage Badge"
        uses: actions/upload-artifact@v6
        with:
          name: swift-coverage-badge
          path: coverage/swift-coverage-badge.json
          retention-days: 90

  deploy-docs:
    name: "Deploy Documentation"
    runs-on: ubuntu-latest
    needs: [ts-code-coverage, kotlin-code-coverage, swift-code-coverage]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0  # Fetch full history for git-revision-date-localized plugin
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Setup Python"
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: "Install uv"
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: "Install MkDocs and dependencies"
        working-directory: scripts/github
        run: uv sync

      - name: "Build documentation"
        run: scripts/github/deploy_pages.py build

      - name: "Download TS Coverage Badge"
        uses: actions/download-artifact@v7
        with:
          name: ts-coverage-badge
          path: site

      - name: "Download Kotlin Coverage Badge"
        uses: actions/download-artifact@v7
        with:
          name: kotlin-coverage-badge
          path: site

      - name: "Download Swift Coverage Badge"
        uses: actions/download-artifact@v7
        with:
          name: swift-coverage-badge
          path: site

      - name: "Setup Pages"
        uses: actions/configure-pages@v5

      - name: "Upload artifact"
        uses: actions/upload-pages-artifact@v4
        with:
          path: './site'

      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4

  # =============================================================================
  # MCP Context Thresholds
  # =============================================================================

  benchmark-context-thresholds:
    name: "Benchmark MCP Context Thresholds"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Run Context Threshold Benchmark"
        id: benchmark
        run: |
          # Create reports directory
          mkdir -p reports

          # Run benchmark and capture exit code
          bun run benchmark-context --output reports/context-benchmark.json || echo "FAILED=true" >> $GITHUB_ENV

          # Always preserve the report file even if benchmark failed
          exit 0

      - name: "Upload Benchmark Report"
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: context-benchmark-report
          path: reports/context-benchmark.json
          retention-days: 90

      - name: "Check Benchmark Result"
        if: always()
        run: |
          if [ "$FAILED" = "true" ]; then
            echo "::error::MCP context threshold benchmark failed - one or more thresholds were exceeded"
            cat reports/context-benchmark.json
            exit 1
          fi
          echo "::notice::MCP context threshold benchmark passed - all thresholds satisfied"

  # =============================================================================
  # Tag Release (triggers release.yml workflow)
  # =============================================================================

  tag-release:
    name: "Create Release Tag"
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      startsWith(github.event.head_commit.message, 'chore: bump versions to v')
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false
          fetch-depth: 0

      - name: "Extract version and create tag"
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # Extract version from commit message
          VERSION=$(echo "$COMMIT_MESSAGE" | sed -n 's/chore: bump versions to v\([0-9.]*\).*/\1/p')

          if [ -z "$VERSION" ]; then
            echo "Could not extract version from commit message: $COMMIT_MESSAGE"
            exit 1
          fi

          TAG="v${VERSION}"
          echo "Creating tag: $TAG"

          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping."
            exit 0
          fi

          # Create and push tag
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

          echo "Successfully created and pushed tag: $TAG"

  # =============================================================================
  # Auto-update README Test Count Badges
  # =============================================================================

  update-readme-badges:
    name: "Update README Test Count Badges"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false
          token: ${{ secrets.AUTO_MOBILE_PR_TOKEN }}

      - name: "Update badge counts"
        shell: bash
        run: bash scripts/update-readme-badges.sh

      - name: "Check for changes"
        id: changes
        shell: bash
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "Create PR for badge update"
        if: steps.changes.outputs.changed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.AUTO_MOBILE_PR_TOKEN }}
          commit-message: "chore: update README test count badges"
          title: "chore: update README test count badges"
          body: |
            ## Automated Badge Update

            Updated test count badges in README.md to reflect current counts.

            ---
            Auto-generated by the `merge` workflow
          branch: auto-update/readme-badges
          delete-branch: true
          labels: |
            automated
            documentation

      - name: "Enable auto-merge on PR"
        if: steps.changes.outputs.changed == 'true' && steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.AUTO_MOBILE_PR_TOKEN }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash
