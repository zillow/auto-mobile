  # =============================================================================
  # Docker Hub Publishing
  # =============================================================================

  publish-docker-hub:
    name: "Publish to Docker Hub"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs:
      - build-ide-plugin
      - ide-plugin-unit-tests
      - validate-xml
      - ktfmt
      - validate-shell-scripts
      - validate-mkdocs-nav
      - validate-documentation-links
      - mcp-build-and-test
      - junit-runner-unit-tests
      - junit-runner-emulator-tests
      - playground-automobile-emulator-tests
      - android-accessibility-service-unit-tests
      - build-junit-runner-library
      - build-android-accessibility-service
      - build-playground-app
      - benchmark-context-thresholds
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true      # ~14 GB
          remove_dotnet: true       # ~2.7 GB
          remove_haskell: true      # Minimal
          remove_tool_cache: false  # Keep Node.js since we need it
          remove_swap: true         # ~4 GB
          remove_codeql: true       # ~5.9 GB (we run CodeQL separately)
          use_rmz: true            # 3x faster deletion

      - name: Clean up Docker
        run: docker system prune -af --volumes

      - name: "Setup Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: "Extract version from package.json"
        id: package-version
        run: |
          VERSION=$(bun -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Log in to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Extract metadata for Docker"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: kaeawc/auto-mobile
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.package-version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.package-version.outputs.version }}
            type=semver,pattern={{major}},value=v${{ steps.package-version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: "Build and push to Docker Hub"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=kaeawc/auto-mobile:latest
            type=gha
          platforms: linux/amd64

      - name: "Update Docker Hub description"
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: kaeawc/auto-mobile
          short-description: "AutoMobile - Android automation MCP server with ADB"
          readme-filepath: ./DOCKER.md

  deploy-docs:
    name: "Deploy Documentation"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for git-revision-date-localized plugin
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Install uv"
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: "Install MkDocs and dependencies"
        working-directory: scripts/github
        run: uv sync

      - name: "Build documentation"
        run: scripts/github/deploy_pages.py build

      - name: "Setup Pages"
        uses: actions/configure-pages@v5

      - name: "Upload artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4

  # =============================================================================
  # MCP Context Thresholds
  # =============================================================================

  benchmark-context-thresholds:
    name: "Benchmark MCP Context Thresholds"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Run Context Threshold Benchmark"
        id: benchmark
        run: |
          # Create reports directory
          mkdir -p reports

          # Run benchmark and capture exit code
          bun run benchmark-context --output reports/context-benchmark.json || echo "FAILED=true" >> $GITHUB_ENV

          # Always preserve the report file even if benchmark failed
          exit 0

      - name: "Upload Benchmark Report"
        uses: actions/upload-artifact@v4.4.0
        if: always()
        with:
          name: context-benchmark-report
          path: reports/context-benchmark.json
          retention-days: 90

      - name: "Check Benchmark Result"
        if: always()
        run: |
          if [ "$FAILED" = "true" ]; then
            echo "::error::MCP context threshold benchmark failed - one or more thresholds were exceeded"
            cat reports/context-benchmark.json
            exit 1
          fi
          echo "::notice::MCP context threshold benchmark passed - all thresholds satisfied"
