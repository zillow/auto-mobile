  deploy-docs:
    name: "Deploy Documentation"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for git-revision-date-localized plugin
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Install uv"
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: "Install MkDocs and dependencies"
        working-directory: scripts/github
        run: uv sync

      - name: "Build documentation"
        run: scripts/github/deploy_pages.py build

      - name: "Setup Pages"
        uses: actions/configure-pages@v5

      - name: "Upload artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4

  # =============================================================================
  # MCP Context Thresholds
  # =============================================================================

  benchmark-context-thresholds:
    name: "Benchmark MCP Context Thresholds"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Run Context Threshold Benchmark"
        id: benchmark
        run: |
          # Create reports directory
          mkdir -p reports

          # Run benchmark and capture exit code
          bun run benchmark-context --output reports/context-benchmark.json || echo "FAILED=true" >> $GITHUB_ENV

          # Always preserve the report file even if benchmark failed
          exit 0

      - name: "Upload Benchmark Report"
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: context-benchmark-report
          path: reports/context-benchmark.json
          retention-days: 90

      - name: "Check Benchmark Result"
        if: always()
        run: |
          if [ "$FAILED" = "true" ]; then
            echo "::error::MCP context threshold benchmark failed - one or more thresholds were exceeded"
            cat reports/context-benchmark.json
            exit 1
          fi
          echo "::notice::MCP context threshold benchmark passed - all thresholds satisfied"

  # =============================================================================
  # Tag Release (triggers release.yml workflow)
  # =============================================================================

  tag-release:
    name: "Create Release Tag"
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      startsWith(github.event.head_commit.message, 'chore: bump versions to v')
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Extract version and create tag"
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # Extract version from commit message
          VERSION=$(echo "$COMMIT_MESSAGE" | sed -n 's/chore: bump versions to v\([0-9.]*\).*/\1/p')

          if [ -z "$VERSION" ]; then
            echo "Could not extract version from commit message: $COMMIT_MESSAGE"
            exit 1
          fi

          TAG="v${VERSION}"
          echo "Creating tag: $TAG"

          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping."
            exit 0
          fi

          # Create and push tag
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

          echo "Successfully created and pushed tag: $TAG"
