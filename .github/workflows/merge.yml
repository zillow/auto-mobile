name: "On Merge"

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  checks: write
  security-events: write
  pull-requests: write
  contents: write
  packages: write

jobs:
  build-desktop-core:
    name: "Build Desktop Core Module"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":desktop-core:build -x test"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

  desktop-core-unit-tests:
    name: "Run Desktop Core Unit Tests"
    runs-on: ubuntu-latest
    needs: build-desktop-core
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":desktop-core:test"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: "Upload Test Results"
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: desktop-core-test-results
          path: android/desktop-core/build/reports/tests/test/

  build-ide-plugin:
    name: "Build IDE Plugin"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/ide-plugin
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: "build -x test"
          gradle-project-directory: "android/ide-plugin"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: "Build Plugin ZIP"
        shell: bash
        working-directory: android/ide-plugin
        run: |
          ./gradlew buildPlugin --stacktrace --continue

      - name: "Verify Plugin"
        shell: bash
        working-directory: android/ide-plugin
        run: |
          ./gradlew verifyPlugin --stacktrace --continue

      - name: "Upload IDE Plugin ZIP"
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: ide-plugin-zip
          path: android/ide-plugin/build/distributions/*.zip

  ide-plugin-unit-tests:
    name: "Run IDE Plugin Unit Tests"
    runs-on: ubuntu-latest
    needs: build-ide-plugin
    defaults:
      run:
        working-directory: android/ide-plugin
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: "test"
          gradle-project-directory: "android/ide-plugin"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: "Upload Test Results"
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ide-plugin-test-results
          path: android/ide-plugin/build/reports/tests/test/

  build-desktop-app:
    name: "Build Desktop App"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":desktop-app:build -x test"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

  desktop-app-unit-tests:
    name: "Run Desktop App Unit Tests"
    runs-on: ubuntu-latest
    needs: build-desktop-app
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":desktop-app:test"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: "Upload Test Results"
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: desktop-app-test-results
          path: android/desktop-app/build/reports/tests/test/

  validate-xml:
    name: "Validate XML"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Run XMLStarlet"
        shell: "bash"
        run: |
          sudo apt-get update
          sudo apt-get install xmlstarlet
          scripts/xml/validate_xml.sh

  ktfmt:
    name: "ktfmt"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Run ktfmt"
        shell: "bash"
        run: |
          INSTALL_KTFMT_WHEN_MISSING=true ONLY_TOUCHED_FILES=false scripts/ktfmt/validate_ktfmt.sh

  validate-shell-scripts:
    name: "Validate Shell Scripts"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Run ShellCheck"
        shell: "bash"
        run: |
          scripts/shellcheck/validate_shell_scripts.sh

  validate-mkdocs-nav:
    name: "Validate MkDocs Navigation"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Validate MkDocs Navigation"
        shell: "bash"
        run: |
          scripts/validate_mkdocs_nav.sh

  validate-claude-plugin:
    name: "Validate Claude Plugin"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Validate Claude Plugin"
        shell: "bash"
        run: |
          scripts/claude/validate_plugin.sh

  validate-documentation-links:
    name: "Validate Documentation Links"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Create contributing file"
        shell: "bash"
        run: |
          touch docs/contributing.md

      - name: "Install Lychee"
        shell: "bash"
        run: |
          scripts/lychee/install_lychee.sh

      - name: "Validate Links"
        shell: "bash"
        run: |
          scripts/lychee/validate_lychee.sh

  installer-minimal:
    name: "Installer Minimal (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Run Installer (minimal)"
        shell: bash
        continue-on-error: true
        run: |
          set -uo pipefail
          mkdir -p ci-logs
          bash ./scripts/install.sh --preset minimal --non-interactive 2>&1 | tee ci-logs/installer.log
          echo "INSTALL_EXIT_CODE=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      - name: "Run Uninstaller"
        shell: bash
        continue-on-error: true
        run: |
          set -uo pipefail
          bash ./scripts/uninstall.sh --all --force 2>&1 | tee ci-logs/uninstaller.log
          echo "UNINSTALL_EXIT_CODE=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      - name: "Upload Logs"
        if: env.INSTALL_EXIT_CODE != '0' || env.UNINSTALL_EXIT_CODE != '0' || failure()
        uses: actions/upload-artifact@v6
        with:
          name: installer-minimal-${{ matrix.os }}-logs
          path: ci-logs/
          retention-days: 7

      - name: "Fail on error"
        if: env.INSTALL_EXIT_CODE != '0' || env.UNINSTALL_EXIT_CODE != '0'
        shell: bash
        run: |
          echo "Installer exit code: ${INSTALL_EXIT_CODE:-0}"
          echo "Uninstaller exit code: ${UNINSTALL_EXIT_CODE:-0}"
          exit 1

  installer-development:
    name: "Installer Development (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Run Installer (development)"
        shell: bash
        continue-on-error: true
        run: |
          set -uo pipefail
          mkdir -p ci-logs
          bash ./scripts/install.sh --preset development --non-interactive 2>&1 | tee ci-logs/installer.log
          echo "INSTALL_EXIT_CODE=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      - name: "Verify runtime dependencies"
        if: env.INSTALL_EXIT_CODE == '0'
        shell: bash
        run: |
          set -uo pipefail

          # Refresh PATH — installer may have added ~/.bun/bin or Homebrew paths
          export PATH="${HOME}/.bun/bin:${PATH}"
          if [[ -f "${HOME}/.bashrc" ]]; then source "${HOME}/.bashrc" 2>/dev/null || true; fi
          hash -r 2>/dev/null || true

          missing=()

          # Core runtime
          command -v bun     >/dev/null 2>&1 || missing+=("bun")
          command -v bunx    >/dev/null 2>&1 || missing+=("bunx")

          # Runtime deps (ffmpeg installed by installer on macOS via brew,
          # pre-installed on ubuntu-latest)
          command -v ffmpeg  >/dev/null 2>&1 || missing+=("ffmpeg")

          # Dev tools (installed by development preset via brew on macOS,
          # some pre-installed on ubuntu-latest)
          command -v shellcheck  >/dev/null 2>&1 || missing+=("shellcheck")
          command -v jq          >/dev/null 2>&1 || missing+=("jq")
          command -v rg          >/dev/null 2>&1 || missing+=("ripgrep")

          # macOS-specific
          if [[ "$(uname -s)" == "Darwin" ]]; then
            command -v yq          >/dev/null 2>&1 || missing+=("yq")
            command -v swiftformat >/dev/null 2>&1 || missing+=("swiftformat")
            command -v swiftlint   >/dev/null 2>&1 || missing+=("swiftlint")
            command -v iproxy      >/dev/null 2>&1 || missing+=("iproxy")
          fi

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing runtime dependencies: ${missing[*]}"
            exit 1
          fi
          echo "All runtime dependencies verified."

      - name: "Build from source"
        if: env.INSTALL_EXIT_CODE == '0'
        shell: bash
        run: |
          export PATH="${HOME}/.bun/bin:${PATH}"
          bun install --frozen-lockfile
          bunx turbo run build --output-logs=errors-only

      - name: "Daemon lifecycle (start → health → doctor → stop)"
        if: env.INSTALL_EXIT_CODE == '0'
        shell: bash
        run: |
          set -uo pipefail
          export PATH="${HOME}/.bun/bin:${PATH}"
          mkdir -p ci-logs

          bun dist/src/index.js --daemon start  2>&1 | tee ci-logs/daemon-start.log
          bun dist/src/index.js --daemon health 2>&1 | tee ci-logs/daemon-health.log

          # Doctor exits non-zero when checks fail (expected on CI without devices).
          # We just verify the daemon responds to the request.
          bun dist/src/index.js --cli doctor --json 2>&1 | tee ci-logs/daemon-doctor.log || true

          bun dist/src/index.js --daemon stop   2>&1 | tee ci-logs/daemon-stop.log

      - name: "Upload Logs"
        if: env.INSTALL_EXIT_CODE != '0' || failure()
        uses: actions/upload-artifact@v6
        with:
          name: installer-development-${{ matrix.os }}-logs
          path: ci-logs/
          retention-days: 7

      - name: "Fail on error"
        if: env.INSTALL_EXIT_CODE != '0'
        shell: bash
        run: |
          echo "Installer exit code: ${INSTALL_EXIT_CODE:-0}"
          exit 1

  mcp-build-and-test:
    name: "Node TypeScript Build and Test (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Cache Turborepo"
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ matrix.os }}-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ matrix.os }}-${{ hashFiles('bun.lock') }}-
            turbo-${{ matrix.os }}-

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Run Lint"
        env:
          TURBO_TELEMETRY_DISABLED: "1"
          TURBO_NO_UPDATE_NOTIFIER: "1"
          DO_NOT_TRACK: "1"
          NO_COLOR: "1"
        run: turbo run lint --output-logs=errors-only --log-order=grouped

      - name: "Run Build"
        shell: bash
        env:
          TURBO_TELEMETRY_DISABLED: "1"
          TURBO_NO_UPDATE_NOTIFIER: "1"
          DO_NOT_TRACK: "1"
          NO_COLOR: "1"
        run: |
          set -euo pipefail
          mkdir -p ci-logs
          turbo run build --output-logs=errors-only --log-order=grouped 2>&1 | tee "ci-logs/bun-build-${{ matrix.os }}.log"

      - name: "Run Tests"
        shell: bash
        env:
          # Force AdbClient into test mode on Windows to prevent adb daemon startup
          AUTOMOBILE_TEST_MODE: ${{ matrix.os == 'windows-latest' && 'true' || '' }}
          TURBO_TELEMETRY_DISABLED: "1"
          TURBO_NO_UPDATE_NOTIFIER: "1"
          DO_NOT_TRACK: "1"
          NO_COLOR: "1"
        run: |
          set -euo pipefail
          mkdir -p ci-logs
          turbo run test --output-logs=errors-only --log-order=grouped 2>&1 | tee "ci-logs/bun-test-${{ matrix.os }}.log"

      - name: "Upload Build/Test Logs"
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: mcp-build-test-logs-${{ matrix.os }}
          path: ci-logs/*.log
          retention-days: 7

  # =============================================================================
  # iOS Build and Test Jobs
  # =============================================================================

  ios-swift-build:
    name: "Build Swift Packages (${{ matrix.config.name }})"
    runs-on: ${{ matrix.config.runner }}
    env:
      IOS_SIGNING_ENABLED: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' }}
      MACOS_SIGNING_ENABLED: ${{ secrets.MACOS_DEVELOPER_ID_CERT_BASE64 != '' }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Xcode 15", runner: "macos-14", xcode: "15.4" }
          - { name: "Xcode 26", runner: "macos-26", xcode: "26.0" }
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Select Xcode ${{ matrix.config.xcode }}"
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.config.xcode }}

      - name: "Install macOS Developer ID certificate"
        if: ${{ env.MACOS_SIGNING_ENABLED == 'true' }}
        env:
          MACOS_DEVELOPER_ID_CERT_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERT_BASE64 }}
          MACOS_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: ./scripts/ios/setup-macos-signing-keychain.sh

      - name: "Install iOS signing certificate"
        if: ${{ env.IOS_SIGNING_ENABLED == 'true' }}
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: ./scripts/ios/setup-signing-keychain.sh

      - name: "Build Swift Packages"
        env:
          MACOS_SIGNING_ENABLED: ${{ env.MACOS_SIGNING_ENABLED }}
          MACOS_DEVELOPER_ID_SIGNING_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_SIGNING_IDENTITY }}
          MACOS_DEVELOPER_ID_TEAM_ID: ${{ secrets.MACOS_DEVELOPER_ID_TEAM_ID }}
          MACOS_SIGNING_STRICT: ${{ env.MACOS_SIGNING_ENABLED }}
          IOS_SIGNING_ENABLED: ${{ env.IOS_SIGNING_ENABLED }}
          IOS_SIGNING_IDENTITY: ${{ secrets.IOS_SIGNING_IDENTITY }}
          IOS_SIGNING_TEAM_ID: ${{ secrets.IOS_SIGNING_TEAM_ID }}
          IOS_SIGNING_STRICT: ${{ env.IOS_SIGNING_ENABLED }}
        run: ./scripts/ios/swift-build.sh

  ios-swift-test:
    name: "Test Swift Packages (${{ matrix.config.name }})"
    runs-on: ${{ matrix.config.runner }}
    needs: ios-swift-build
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Xcode 15", runner: "macos-14", xcode: "15.4" }
          - { name: "Xcode 26", runner: "macos-26", xcode: "26.0" }
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Select Xcode ${{ matrix.config.xcode }}"
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.config.xcode }}

      - name: "Test Swift Packages"
        run: ./scripts/ios/swift-test.sh

  ios-xcodegen:
    name: "Generate Xcode Projects"
    runs-on: macos-26
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Install XcodeGen"
        run: brew install xcodegen

      - name: "Generate Xcode Projects"
        run: ./scripts/ios/xcodegen-generate.sh

  ios-xcode-build:
    name: "Build Xcode Projects (${{ matrix.config.name }})"
    runs-on: ${{ matrix.config.runner }}
    needs: ios-xcodegen
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Xcode 15", runner: "macos-14", xcode: "15.4" }
          - { name: "Xcode 26", runner: "macos-26", xcode: "26.0" }
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Select Xcode ${{ matrix.config.xcode }}"
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.config.xcode }}

      - name: "Ensure iOS Simulator runtime"
        uses: ./.github/actions/ensure-ios-simulator-runtime

      - name: "Install XcodeGen"
        run: brew install xcodegen

      - name: "Generate Xcode Projects"
        run: ./scripts/ios/xcodegen-generate.sh

      - name: "Build Xcode Projects"
        run: ./scripts/ios/xcode-build.sh

  # =============================================================================
  # Android Build and Test Jobs
  # =============================================================================

  junit-runner-unit-tests:
    name: "Run JUnit Runner Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      # Only run unit tests without Emulator
      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":junit-runner:test"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          release-keystore-base64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          release-keystore-password: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          release-key-alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          release-key-password: ${{ secrets.RELEASE_KEY_PASSWORD }}

  # Test isolation issue resolved in #107 and #109
  # Re-enabled in #110
  junit-runner-emulator-tests:
    name: "Run JUnit Runner Emulator Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-android-control-proxy
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Download CtrlProxy APK"
        uses: actions/download-artifact@v7
        with:
          name: control-proxy-apk
          path: android/control-proxy/build/outputs/apk/debug

      # Run AutoMobile tests that require emulator
      - uses: ./.github/actions/android-emulator
        with:
          script: "./gradlew :junit-runner:test"
          working-directory: './android/'
          accessibility-apk-path: control-proxy/build/outputs/apk/debug/control-proxy-debug.apk
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          release-keystore-base64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          release-keystore-password: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          release-key-alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          release-key-password: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: "Upload Test Results"
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: junit-runner-emulator-test-results
          path: android/junit-runner/build/reports/tests/test/

      - name: "Publish Test Report"
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          check_name: "JUnit Runner Emulator Test Report"
          report_paths: '**/build/test-results/**/*.xml'

  playground-automobile-emulator-tests:
    name: "Run Playground Automobile Emulator Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-android-control-proxy
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Download CtrlProxy APK"
        uses: actions/download-artifact@v7
        with:
          name: control-proxy-apk
          path: android/control-proxy/build/outputs/apk/debug

      # Run AutoMobile tests that require emulator
      - uses: ./.github/actions/android-emulator
        with:
          script: "./gradlew :playground:app:test --stacktrace"
          working-directory: './android/'
          accessibility-apk-path: control-proxy/build/outputs/apk/debug/control-proxy-debug.apk
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          release-keystore-base64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          release-keystore-password: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          release-key-alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          release-key-password: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: "Upload Test Results"
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playground-automobile-emulator-test-results
          path: android/playground/app/build/reports/tests/test/

      - name: "Publish Test Report"
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          check_name: "Playground Automobile Emulator Test Report"
          report_paths: '**/build/test-results/**/*.xml'

  android-control-proxy-unit-tests:
    name: "Run CtrlProxy Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":control-proxy:testDebugUnitTest"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          release-keystore-base64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          release-keystore-password: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          release-key-alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          release-key-password: ${{ secrets.RELEASE_KEY_PASSWORD }}

  build-junit-runner-library:
    name: "Build JUnitRunner Library"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":junitRunner:assemble"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          release-keystore-base64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          release-keystore-password: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          release-key-alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          release-key-password: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: "Store AAR"
        uses: actions/upload-artifact@v6
        with:
          name: aar
          path: core/build/outputs/aar/core-debug.aar

  build-android-control-proxy:
    name: "Build CtrlProxy APK"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":control-proxy:assembleDebug"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          release-keystore-base64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          release-keystore-password: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          release-key-alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          release-key-password: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: "Upload CtrlProxy APK"
        uses: actions/upload-artifact@v6
        with:
          name: control-proxy-apk
          path: android/control-proxy/build/outputs/apk/debug/control-proxy-debug.apk

  build-playground-app:
    name: "Build Playground App"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":playground:app:assembleDebug"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          release-keystore-base64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          release-keystore-password: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          release-key-alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          release-key-password: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: "Store Sample APK"
        uses: actions/upload-artifact@v6
        if: success()  # Only upload if build succeeded
        with:
          name: playground-app-apk
          path: android/playground/app/build/outputs/apk/debug/playground-app-debug.apk

  publish-android-libraries-snapshot:
    name: "Publish Android Libraries Snapshot"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs:
      - build-ide-plugin
      - ide-plugin-unit-tests
      - validate-xml
      - ktfmt
      - validate-shell-scripts
      - validate-mkdocs-nav
      - validate-documentation-links
      - mcp-build-and-test
      - junit-runner-unit-tests
      - junit-runner-emulator-tests
      - playground-automobile-emulator-tests
      - android-control-proxy-unit-tests
      - build-junit-runner-library
      - build-android-control-proxy
      - build-playground-app
      - benchmark-context-thresholds
    env:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME || vars.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD || vars.MAVEN_PASSWORD }}
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME || vars.MAVEN_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD || vars.MAVEN_PASSWORD }}
      SIGNING_IN_MEMORY_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY || vars.SIGNING_IN_MEMORY_KEY }}
      SIGNING_IN_MEMORY_KEY_PASSWORD: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD || vars.SIGNING_IN_MEMORY_KEY_PASSWORD }}
      SIGNING_IN_MEMORY_KEY_ID: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID || vars.SIGNING_IN_MEMORY_KEY_ID }}
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Read library version"
        id: library-version
        shell: bash
        run: |
          # Read VERSION_NAME from gradle.properties (single source of truth)
          version=$(grep -E '^VERSION_NAME=' android/gradle.properties | cut -d'=' -f2)
          if [ -z "$version" ]; then
            echo "Could not find VERSION_NAME in android/gradle.properties" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Library version: $version"

      - name: "Verify Maven Central credentials"
        if: ${{ endsWith(steps.library-version.outputs.version, '-SNAPSHOT') }}
        shell: bash
        run: |
          if [ -z "$MAVEN_USERNAME" ] || [ -z "$MAVEN_PASSWORD" ]; then
            echo "Missing MAVEN_USERNAME or MAVEN_PASSWORD for snapshot publish." >&2
            exit 1
          fi

      - name: "Export signing credentials"
        if: ${{ endsWith(steps.library-version.outputs.version, '-SNAPSHOT') }}
        shell: bash
        run: |
          if [ -n "$SIGNING_IN_MEMORY_KEY" ]; then
            echo "ORG_GRADLE_PROJECT_signingInMemoryKey=$SIGNING_IN_MEMORY_KEY" >> "$GITHUB_ENV"
          fi
          if [ -n "$SIGNING_IN_MEMORY_KEY_PASSWORD" ]; then
            echo "ORG_GRADLE_PROJECT_signingInMemoryKeyPassword=$SIGNING_IN_MEMORY_KEY_PASSWORD" >> "$GITHUB_ENV"
          fi
          if [ -n "$SIGNING_IN_MEMORY_KEY_ID" ]; then
            echo "ORG_GRADLE_PROJECT_signingInMemoryKeyId=$SIGNING_IN_MEMORY_KEY_ID" >> "$GITHUB_ENV"
          fi

      - uses: ./.github/actions/gradle-task-run
        if: ${{ endsWith(steps.library-version.outputs.version, '-SNAPSHOT') }}
        with:
          gradle-tasks: ":junit-runner:publish :auto-mobile-sdk:publish"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          release-keystore-base64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          release-keystore-password: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          release-key-alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          release-key-password: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: "Skip snapshot publish (non-snapshot version)"
        if: ${{ !endsWith(steps.library-version.outputs.version, '-SNAPSHOT') }}
        run: |
          echo "Skipping publish. Version is ${{ steps.library-version.outputs.version }}."

