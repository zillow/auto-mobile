  # =============================================================================
  # Docker Hub Publishing
  # =============================================================================

  publish-docker-hub:
    name: "Publish to Docker Hub"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Setup Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: "Extract version from package.json"
        id: package-version
        run: |
          VERSION=$(bun -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Log in to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Extract metadata for Docker"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: kaeawc/auto-mobile
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.package-version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.package-version.outputs.version }}
            type=semver,pattern={{major}},value=v${{ steps.package-version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: "Build and push to Docker Hub"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: "Update Docker Hub description"
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: kaeawc/auto-mobile
          short-description: "AutoMobile - Android automation MCP server with ADB"
          readme-filepath: ./DOCKER.md

  deploy-docs:
    name: "Deploy Documentation"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for git-revision-date-localized plugin
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Install uv"
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: "Install MkDocs and dependencies"
        working-directory: scripts/github
        run: uv sync

      - name: "Build documentation"
        run: scripts/github/deploy_pages.py build

      - name: "Setup Pages"
        uses: actions/configure-pages@v5

      - name: "Upload artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
