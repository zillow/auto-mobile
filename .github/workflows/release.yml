name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Accessibility Service APK
        run: |
          cd android
          ./gradlew clean
          ./gradlew :accessibility-service:assembleDebug

      - name: Verify APK exists
        run: |
          APK_PATH="android/accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "Error: APK not found at $APK_PATH"
            exit 1
          fi
          echo "APK found at $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Verify APK SHA256 matches source
        id: verify_checksum
        run: |
          APK_PATH="android/accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk"

          BUILT_SHA256=$(sha256sum "$APK_PATH" | cut -d' ' -f1)
          echo "Built APK SHA256: $BUILT_SHA256"

          SOURCE_SHA256=$(grep 'APK_SHA256_CHECKSUM' src/constants/release.ts | sed 's/.*"\([^"]*\)".*/\1/')
          echo "Source SHA256:    $SOURCE_SHA256"

          if [ -z "$SOURCE_SHA256" ]; then
            echo ""
            echo "ERROR: No SHA256 checksum in source!"
            echo ""
            echo "The source file has an empty checksum. This means the auto-update PR"
            echo "was never merged. Please ensure the SHA256 update PR is merged before releasing."
            echo ""
            echo "Check for open PRs: gh pr list --search 'update accessibility service APK SHA256'"
            exit 1
          fi

          if [ "$BUILT_SHA256" != "$SOURCE_SHA256" ]; then
            echo ""
            echo "ERROR: APK SHA256 mismatch!"
            echo ""
            echo "The built APK has a different checksum than what's in source."
            echo "This likely means accessibility-service code changed after the last"
            echo "checksum update PR was merged."
            echo ""
            echo "Please:"
            echo "1. Check if there's a pending SHA256 update PR"
            echo "2. If not, trigger a new build on main to generate one"
            echo "3. Merge the update PR before releasing"
            exit 1
          fi

          echo ""
          echo "SHA256 verified successfully."
          echo "checksum=$BUILT_SHA256" >> $GITHUB_OUTPUT

      - name: Generate release constants
        run: |
          RELEASE_VERSION="${{ steps.version.outputs.version }}" \
          bash scripts/generate-release-constants.sh

      - name: Run tests
        run: bun run test

      - name: Run lint
        run: bun run lint

      - name: Build TypeScript with injected checksum
        run: bun run build

      - name: Create release notes
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Extract changelog for this version if it exists
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/## \[${VERSION}\]/,/## \[/" CHANGELOG.md | sed '1d;$d' | sed '/^$/d')
            if [ -z "$NOTES" ]; then
              NOTES="Release v${VERSION}"
            fi
          else
            NOTES="Release v${VERSION}"
          fi

          # Add checksum to notes
          CHECKSUM="${{ steps.verify_checksum.outputs.checksum }}"
          NOTES="${NOTES}"$'\n\n'"## Accessibility Service APK"$'\n\n'"**SHA256 Checksum:** \`${CHECKSUM}\`"$'\n\n'"Download the APK from the release assets below."

          # Save to file for GitHub release
          echo "$NOTES" > release_notes.txt

          # Also output for later steps
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: bun publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: AutoMobile v${{ steps.version.outputs.version }}
          body_path: release_notes.txt
          files: |
            android/accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**APK Built:** accessibility-service-debug.apk" >> $GITHUB_STEP_SUMMARY
          echo "**SHA256:** \`${{ steps.verify_checksum.outputs.checksum }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**npm Published:** https://www.npmjs.com/package/@kaeawc/auto-mobile/v/${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**GitHub Release:** https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checksum Baked Into Package" >> $GITHUB_STEP_SUMMARY
          echo "The npm package includes the APK checksum at build time, ensuring integrity verification." >> $GITHUB_STEP_SUMMARY
