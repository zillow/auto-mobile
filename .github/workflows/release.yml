name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

jobs:
  build-xctestservice-ipa:
    name: "Build XCTestService IPA"
    runs-on: macos-15
    outputs:
      sha256: ${{ steps.checksum.outputs.ipa_sha256 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "Select Xcode 16.2"
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: "Install XcodeGen"
        run: brew install xcodegen

      - name: "Install xcpretty"
        run: gem install xcpretty

      - name: "Build XCTestService IPA"
        id: checksum
        run: ./scripts/ios/xctestservice-create-ipa.sh --output /tmp/XCTestService.ipa

      - name: "Upload XCTestService IPA"
        uses: actions/upload-artifact@v4
        with:
          name: xctestservice-ipa
          path: /tmp/XCTestService.ipa
          retention-days: 1

  build-and-release:
    runs-on: ubuntu-latest
    needs: build-xctestservice-ipa

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ensure npm CLI is 11.5.1+
        run: npm install -g npm@11.5.1

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Setup Release Keystore
        run: |
          mkdir -p android/keystore
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/keystore/release.keystore

      - name: Build Accessibility Service APK
        env:
          RELEASE_KEYSTORE_PATH: keystore/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew clean
          ./gradlew :accessibility-service:assembleDebug

      - name: Verify APK exists
        run: |
          APK_PATH="android/accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "Error: APK not found at $APK_PATH"
            exit 1
          fi
          echo "APK found at $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Verify APK SHA256 matches source
        id: verify_checksum
        run: |
          APK_PATH="android/accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk"

          BUILT_SHA256=$(sha256sum "$APK_PATH" | cut -d' ' -f1)
          echo "Built APK SHA256: $BUILT_SHA256"

          SOURCE_SHA256=$(grep 'APK_SHA256_CHECKSUM' src/constants/release.ts | sed 's/.*"\([^"]*\)".*/\1/')
          echo "Source SHA256:    $SOURCE_SHA256"

          if [ -z "$SOURCE_SHA256" ]; then
            echo ""
            echo "ERROR: No SHA256 checksum in source!"
            echo ""
            echo "The source file has an empty checksum. This means the auto-update PR"
            echo "was never merged. Please ensure the SHA256 update PR is merged before releasing."
            echo ""
            echo "Check for open PRs: gh pr list --search 'update accessibility service APK SHA256'"
            exit 1
          fi

          if [ "$BUILT_SHA256" != "$SOURCE_SHA256" ]; then
            echo ""
            echo "ERROR: APK SHA256 mismatch!"
            echo ""
            echo "The built APK has a different checksum than what's in source."
            echo "This likely means accessibility-service code changed after the last"
            echo "checksum update PR was merged."
            echo ""
            echo "Please:"
            echo "1. Check if there's a pending SHA256 update PR"
            echo "2. If not, trigger a new build on main to generate one"
            echo "3. Merge the update PR before releasing"
            exit 1
          fi

          echo ""
          echo "SHA256 verified successfully."
          echo "checksum=$BUILT_SHA256" >> $GITHUB_OUTPUT

      - name: "Download XCTestService IPA"
        uses: actions/download-artifact@v4
        with:
          name: xctestservice-ipa
          path: /tmp

      - name: "Verify XCTestService IPA SHA256 matches source"
        id: verify_ipa_checksum
        run: |
          IPA_PATH="/tmp/XCTestService.ipa"

          BUILT_SHA256=$(sha256sum "$IPA_PATH" | cut -d' ' -f1)
          echo "Built IPA SHA256: $BUILT_SHA256"

          SOURCE_SHA256=$(grep 'XCTESTSERVICE_SHA256_CHECKSUM' src/constants/release.ts | sed 's/.*"\([^"]*\)".*/\1/')
          echo "Source SHA256:    $SOURCE_SHA256"

          if [ -z "$SOURCE_SHA256" ]; then
            echo ""
            echo "WARNING: No XCTestService SHA256 checksum in source."
            echo "This is expected for the first release with XCTestService IPA."
            echo "Skipping verification."
            echo ""
          elif [ "$BUILT_SHA256" != "$SOURCE_SHA256" ]; then
            echo ""
            echo "ERROR: XCTestService IPA SHA256 mismatch!"
            echo ""
            echo "The built IPA has a different checksum than what's in source."
            echo "This likely means XCTestService code changed after the last"
            echo "checksum update PR was merged."
            echo ""
            echo "Please:"
            echo "1. Check if there's a pending SHA256 update PR"
            echo "2. If not, trigger the nightly workflow to generate one"
            echo "3. Merge the update PR before releasing"
            exit 1
          else
            echo ""
            echo "XCTestService IPA SHA256 verified successfully."
          fi

          echo "checksum=$BUILT_SHA256" >> $GITHUB_OUTPUT

      - name: Generate release constants
        run: |
          RELEASE_VERSION="${{ steps.version.outputs.version }}" \
          XCTESTSERVICE_RELEASE_VERSION="${{ steps.version.outputs.version }}" \
          bash scripts/generate-release-constants.sh

      - name: Run tests
        run: bun run test

      - name: Run lint
        run: bun run lint

      - name: Build TypeScript with injected checksum
        run: bun run build

      - name: Create release notes
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Extract changelog for this version if it exists
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk -v version="$VERSION" '
              $0 ~ "^## \\[v?"version"\\]" {in_section=1; next}
              in_section && $0 ~ "^## \\[" {exit}
              in_section {print}
            ' CHANGELOG.md | sed '/^$/d')
            if [ -z "$NOTES" ]; then
              NOTES="Release v${VERSION}"
            fi
          else
            NOTES="Release v${VERSION}"
          fi

          # Add checksum to notes
          APK_CHECKSUM="${{ steps.verify_checksum.outputs.checksum }}"
          IPA_CHECKSUM="${{ steps.verify_ipa_checksum.outputs.checksum }}"
          NOTES="${NOTES}"$'\n\n'"## Accessibility Service APK"$'\n\n'"**SHA256 Checksum:** \`${APK_CHECKSUM}\`"$'\n\n'"Download the APK from the release assets below."
          NOTES="${NOTES}"$'\n\n'"## XCTestService IPA"$'\n\n'"**SHA256 Checksum:** \`${IPA_CHECKSUM}\`"$'\n\n'"Download the IPA from the release assets below."

          # Save to file for GitHub release
          echo "$NOTES" > release_notes.txt

          # Also output for later steps
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Publish Android Libraries to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
        run: |
          cd android
          # Override VERSION_NAME with the release version from git tag (not the SNAPSHOT in gradle.properties)
          ./gradlew :junit-runner:publishAndReleaseToMavenCentral :auto-mobile-sdk:publishAndReleaseToMavenCentral \
            -PVERSION_NAME=${{ steps.version.outputs.version }} \
            --no-configuration-cache

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true      # ~14 GB
          remove_dotnet: true       # ~2.7 GB
          remove_haskell: true      # Minimal
          remove_tool_cache: false  # Keep Node.js since we need it
          remove_swap: true         # ~4 GB
          remove_codeql: true       # ~5.9 GB (we run CodeQL separately)
          use_rmz: true            # 3x faster deletion

      - name: Clean up Docker
        run: docker system prune -af --volumes

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: kaeawc/auto-mobile
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AutoMobile v${{ steps.version.outputs.version }}
          body_path: release_notes.txt
          files: |
            android/accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk
            /tmp/XCTestService.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**APK Built:** accessibility-service-debug.apk" >> $GITHUB_STEP_SUMMARY
          echo "**APK SHA256:** \`${{ steps.verify_checksum.outputs.checksum }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**IPA Built:** XCTestService.ipa" >> $GITHUB_STEP_SUMMARY
          echo "**IPA SHA256:** \`${{ steps.verify_ipa_checksum.outputs.checksum }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- **npm:** https://www.npmjs.com/package/@kaeawc/auto-mobile/v/${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Hub:** https://hub.docker.com/r/kaeawc/auto-mobile/tags" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub Release:** https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Maven Central:** [auto-mobile-junit-runner](https://central.sonatype.com/artifact/dev.jasonpearson.auto-mobile/auto-mobile-junit-runner)" >> $GITHUB_STEP_SUMMARY
          echo "- **Maven Central:** [auto-mobile-sdk](https://central.sonatype.com/artifact/dev.jasonpearson.auto-mobile/auto-mobile-sdk)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull kaeawc/auto-mobile:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull kaeawc/auto-mobile:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Maven Central" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`kotlin" >> $GITHUB_STEP_SUMMARY
          echo "testImplementation(\"dev.jasonpearson.auto-mobile:auto-mobile-junit-runner:${{ steps.version.outputs.version }}\")" >> $GITHUB_STEP_SUMMARY
          echo "implementation(\"dev.jasonpearson.auto-mobile:auto-mobile-sdk:${{ steps.version.outputs.version }}\")" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checksums Baked Into Package" >> $GITHUB_STEP_SUMMARY
          echo "The npm package includes the APK and IPA checksums at build time, ensuring integrity verification." >> $GITHUB_STEP_SUMMARY
