name: "Docker Build and Test"

on:
  pull_request:
    branches:
      - "**"
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml"
      - ".hadolint.yaml"
      - "scripts/docker/**"
      - ".github/workflows/docker.yml"
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml"

permissions:
  contents: read
  packages: write

jobs:
  hadolint:
    name: "Lint Dockerfile"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Run hadolint"
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          failure-threshold: error

  docker-build:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    needs: hadolint
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Build Docker image"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: auto-mobile:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Run container structure tests"
        run: |
          IMAGE_NAME=auto-mobile:test bash scripts/docker/test_container.sh

      - name: "Test MCP stdio protocol"
        run: |
          # Test that the server can receive and respond to MCP initialize
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0.0"}}}'
          RESPONSE=$(echo "$INIT" | timeout 5 docker run -i --rm auto-mobile:test 2>/dev/null | head -1 || true)
          echo "Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"jsonrpc":"2.0"'; then
            echo "✓ MCP stdio protocol test passed"
          else
            echo "⚠ MCP stdio test inconclusive (may need more time to initialize)"
          fi

      - name: "Save Docker image"
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker save auto-mobile:test | gzip > auto-mobile-docker-image.tar.gz

      - name: "Upload Docker image artifact"
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4.4.0
        with:
          name: auto-mobile-docker-image
          path: auto-mobile-docker-image.tar.gz
          retention-days: 7

  docker-compose-test:
    name: "Test Docker Compose"
    runs-on: ubuntu-latest
    needs: hadolint
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Test docker-compose configuration"
        run: |
          docker-compose config

      - name: "Build with docker-compose"
        run: |
          docker-compose build auto-mobile

      - name: "Verify services are defined"
        run: |
          docker-compose config --services | grep -q auto-mobile
          docker-compose config --services | grep -q auto-mobile-dev

  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Build Docker image for scanning"
        run: |
          docker build -t auto-mobile:scan .

      - name: "Run Trivy vulnerability scanner"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "auto-mobile:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: "Upload Trivy results to GitHub Security"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
