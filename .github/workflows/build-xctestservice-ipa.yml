name: "Build XCTestService IPA"

on:
  workflow_call:
    outputs:
      sha256:
        description: "SHA256 checksum of the built IPA"
        value: ${{ jobs.build.outputs.sha256 }}

jobs:
  build:
    name: "Build XCTestService IPA"
    runs-on: macos-26
    outputs:
      sha256: ${{ steps.checksum.outputs.ipa_sha256 }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Select Xcode 26.0"
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - name: "Cache Homebrew packages"
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/xcodegen
            /usr/local/Cellar/xcodegen
          key: homebrew-xcodegen-${{ runner.os }}

      - name: "Install XcodeGen"
        run: brew install xcodegen

      - name: "Cache Ruby gems"
        uses: actions/cache@v4
        with:
          path: ~/.gem
          key: gems-xcpretty-${{ runner.os }}

      - name: "Install xcpretty"
        run: gem install xcpretty

      - name: "Build XCTestService IPA"
        id: checksum
        run: ./scripts/ios/xctestservice-create-ipa.sh --output /tmp/XCTestService.ipa

      - name: "Upload XCTestService IPA"
        uses: actions/upload-artifact@v6
        with:
          name: xctestservice-ipa
          path: /tmp/XCTestService.ipa
          retention-days: 7
