name: "Pull Request"

on:
  pull_request:
    branches:
      - "**"

permissions:
  actions: read
  checks: write
  security-events: write
  pull-requests: write
  contents: read
  packages: write

jobs:
  # =============================================================================
  # Change Detection
  # =============================================================================
  # Detect if only documentation files were changed to skip long-running jobs
  # Detect if only SHA256 checksum was changed to skip long-running jobs
  detect-changes:
    name: "Detect Documentation-Only or SHA256-Only Changes"
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
      sha256_only: ${{ steps.check-sha256.outputs.sha256_only }}
      ide_plugin_changed: ${{ steps.filter-ide-plugin.outputs.ide_plugin }}
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Check for documentation-only changes"
        id: filter
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;

            // Get list of changed files
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            // Documentation file patterns
            const docPatterns = [
              /\.md$/,                    // **/*.md
              /^docs\//,                  // docs/**
              /^mkdocs\.yml$/,            // mkdocs.yml
              /^\.lychee\.toml$/          // .lychee.toml
            ];

            // Check if a file matches any documentation pattern
            const isDocFile = (filename) => {
              return docPatterns.some(pattern => pattern.test(filename));
            };

            // Check if ALL files are documentation files
            const allFilesAreDocs = files.length > 0 && files.every(file => isDocFile(file.filename));

            console.log('Files changed:', files.map(f => f.filename).join(', '));
            console.log('Total files:', files.length);
            console.log('All files are docs:', allFilesAreDocs);
            files.forEach(file => {
              console.log(`  ${file.filename}: ${isDocFile(file.filename) ? 'doc' : 'code'}`);
            });

            core.setOutput('docs_only', allFilesAreDocs.toString());
            return allFilesAreDocs;

      - name: "Check for SHA256-only changes"
        id: check-sha256
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;

            // Get PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            // Check if title matches the automated SHA256 update pattern
            const titleMatches = pr.title === 'chore: update accessibility service APK SHA256';

            // Get list of changed files
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            // Check if only src/constants/release.ts was changed
            const onlyReleaseFileChanged = files.length === 1 &&
                                          files[0].filename === 'src/constants/release.ts';

            // Skip only if BOTH conditions are met
            const sha256Only = titleMatches && onlyReleaseFileChanged;

            console.log('PR Title:', pr.title);
            console.log('Title matches:', titleMatches);
            console.log('Files changed:', files.map(f => f.filename).join(', '));
            console.log('Only release.ts changed:', onlyReleaseFileChanged);
            console.log('Result - SHA256 only:', sha256Only);

            core.setOutput('sha256_only', sha256Only.toString());
            return sha256Only;

      - name: "Check for IDE Plugin changes"
        id: filter-ide-plugin
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ide_plugin:
              - 'android/ide-plugin/**'

  # =============================================================================
  # Fast Validation Jobs (Always Run)
  # =============================================================================

  build-ide-plugin:
    name: "Build IDE Plugin"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.ide_plugin_changed == 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    defaults:
      run:
        working-directory: android/ide-plugin
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: "build -x test"
          gradle-project-directory: "android/ide-plugin"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: "Build Plugin ZIP"
        shell: bash
        working-directory: android/ide-plugin
        run: |
          ./gradlew buildPlugin --stacktrace --continue

      - name: "Verify Plugin"
        shell: bash
        working-directory: android/ide-plugin
        run: |
          ./gradlew verifyPlugin --stacktrace --continue

      - name: "Upload IDE Plugin ZIP"
        uses: actions/upload-artifact@v4.4.0
        if: success()
        with:
          name: ide-plugin-zip
          path: android/ide-plugin/build/distributions/*.zip

  ide-plugin-unit-tests:
    name: "Run IDE Plugin Unit Tests"
    runs-on: ubuntu-latest
    needs: [detect-changes, build-ide-plugin]
    if: needs.detect-changes.outputs.ide_plugin_changed == 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    defaults:
      run:
        working-directory: android/ide-plugin
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: "test"
          gradle-project-directory: "android/ide-plugin"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: "Upload Test Results"
        if: failure()
        uses: actions/upload-artifact@v4.4.0
        with:
          name: ide-plugin-test-results
          path: android/ide-plugin/build/reports/tests/test/

  validate-yaml:
    name: "Validate YAML Test Plans"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Validate YAML Test Plans"
        run: bun run validate:yaml

  validate-xml:
    name: "Validate XML"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.sha256_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Run XMLStarlet"
        shell: "bash"
        run: |
          sudo apt-get update
          sudo apt-get install xmlstarlet
          scripts/xml/validate_xml.sh

  ktfmt:
    name: "ktfmt"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.sha256_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Run ktfmt"
        shell: "bash"
        run: |
          INSTALL_KTFMT_WHEN_MISSING=true ONLY_TOUCHED_FILES=false scripts/ktfmt/validate_ktfmt.sh

  validate-shell-scripts:
    name: "Validate Shell Scripts"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.sha256_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Run ShellCheck"
        shell: "bash"
        run: |
          scripts/shellcheck/validate_shell_scripts.sh

  validate-mkdocs-nav:
    name: "Validate MkDocs Navigation"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.sha256_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Validate MkDocs Navigation"
        shell: "bash"
        run: |
          scripts/validate_mkdocs_nav.sh

  validate-documentation-links:
    name: "Validate Documentation Links"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.sha256_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Create contributing index file"
        shell: "bash"
        run: |
          touch docs/contributing/index.md

      - name: "Install Lychee"
        shell: "bash"
        run: |
          scripts/lychee/install_lychee.sh

      - name: "Validate Links"
        shell: "bash"
        run: |
          scripts/lychee/validate_lychee.sh

  # =============================================================================
  # Security Analysis (Skip for docs-only changes)
  # =============================================================================

  codeql-node:
    name: "CodeQL Analysis - Node.js/TypeScript"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'typescript' ]
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Initialize CodeQL"
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Build TypeScript"
        run: bun run build

      - name: "Perform CodeQL Analysis"
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  bun-audit:
    name: "Bun Security Audit"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.sha256_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Run Bun Audit"
        run: |
          bun pm audit --json > bun-audit-results.json || true
        continue-on-error: true

      - name: "Upload Bun Audit Results"
        uses: actions/upload-artifact@v4.4.0
        if: always()
        with:
          name: bun-audit-results
          path: bun-audit-results.json

  # =============================================================================
  # Node TypeScript Build and Test (Skip for docs-only changes)
  # =============================================================================

  mcp-build-and-test:
    name: "Node TypeScript Build and Test"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Run Lint"
        run: bun run lint

      - name: "Run Tests"
        run: bun run test

  memory-leak-detection:
    name: "Memory Leak Detection"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    timeout-minutes: 30
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Setup Node for native addons"
        uses: actions/setup-node@v4
        with:
          node-version: "18.20.5"

      - name: "Trust heapdump"
        run: bun pm trust heapdump

      - name: "Trust memwatch-next"
        continue-on-error: true
        run: bun pm trust memwatch-next

      - name: "Rebuild native dependencies"
        run: bun install --frozen-lockfile

      - name: "Run Memory Leak Detection"
        run: bun run test:memory-leaks

      - name: "Upload Heap Snapshots"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: heap-snapshots
          path: "*.heapsnapshot"

  # =============================================================================
  # Android Build and Test Jobs (Skip for docs-only changes)
  # =============================================================================

  junit-runner-unit-tests:
    name: "Run JUnit Runner Unit Tests"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      # Only run unit tests without Emulator
      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":junit-runner:test"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: "Upload Heap Dumps"
        if: failure()
        uses: actions/upload-artifact@v4.4.0
        with:
          name: junit-runner-heap-dumps
          path: heap-dump
          if-no-files-found: ignore

  # Test isolation issue resolved in #107 and #109
  # Re-enabled in #110
  junit-runner-emulator-tests:
    name: "Run JUnit Runner Emulator Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [detect-changes, build-android-accessibility-service]
    if: needs.detect-changes.outputs.docs_only != 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Download Accessibility Service APK"
        uses: actions/download-artifact@v4
        with:
          name: accessibility-service-apk
          path: android/accessibility-service/build/outputs/apk/debug

      # Run AutoMobile tests that require emulator
      - uses: ./.github/actions/android-emulator
        with:
          script: "./gradlew :junit-runner:test --stacktrace --info"
          working-directory: './android/'
          accessibility-apk-path: accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk
          gradle-home-directory: "~/.gradle/${{ github.job }}"
      - name: "Upload Heap Dumps"
        if: failure()
        uses: actions/upload-artifact@v4.4.0
        with:
          name: junit-runner-heap-dumps
          path: heap-dump
          if-no-files-found: ignore

      - name: "Upload Test Results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-runner-emulator-test-results
          path: android/junit-runner/build/reports/tests/test/

      - name: "Publish Test Report"
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          check_name: "JUnit Runner Emulator Test Report"
          report_paths: '**/build/test-results/**/*.xml'

  playground-automobile-emulator-tests:
    name: "Run Playground Automobile Emulator Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [detect-changes, build-android-accessibility-service]
    if: needs.detect-changes.outputs.docs_only != 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Download Accessibility Service APK"
        uses: actions/download-artifact@v4
        with:
          name: accessibility-service-apk
          path: android/accessibility-service/build/outputs/apk/debug

      # Run AutoMobile tests that require emulator
      - uses: ./.github/actions/android-emulator
        with:
          script: "./gradlew :playground:app:test --stacktrace --info"
          working-directory: './android/'
          accessibility-apk-path: accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk
          gradle-home-directory: "~/.gradle/${{ github.job }}"

      - name: "Upload Test Results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playground-automobile-emulator-test-results
          path: android/playground/app/build/reports/tests/test/

      - name: "Publish Test Report"
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          check_name: "Playground Automobile Emulator Test Report"
          report_paths: '**/build/test-results/**/*.xml'

  android-accessibility-service-unit-tests:
    name: "Run Accessibility Service Unit Tests"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":accessibility-service:testDebugUnitTest"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

  build-junit-runner-library:
    name: "Build JUnitRunner Library"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":junitRunner:assemble"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: "Store AAR"
        uses: actions/upload-artifact@v4.4.0
        with:
          name: aar
          path: core/build/outputs/aar/core-debug.aar

  build-android-accessibility-service:
    name: "Build Accessibility Service"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":accessibility-service:assembleDebug"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: "Store Accessibility Service APK"
        uses: actions/upload-artifact@v4.4.0
        with:
          name: accessibility-service-apk
          path: android/accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk

  build-playground-app:
    name: "Build Playground App"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    defaults:
      run:
        working-directory: android
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":playground:app:assembleDebug"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: "Store Sample APK"
        uses: actions/upload-artifact@v4.4.0
        if: success()  # Only upload if build succeeded
        with:
          name: playground-app-apk
          path: android/playground/app/build/outputs/apk/debug/playground-app-debug.apk

  # =============================================================================
  # Docker Build and Validation
  # =============================================================================

  detect-docker-changes:
    name: "Detect Docker File Changes"
    runs-on: ubuntu-latest
    outputs:
      docker-changed: ${{ steps.filter.outputs.docker }}
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Check for Docker-related changes"
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - '.dockerignore'
              - 'package.json'
              - 'bun.lock'
              - '.hadolint.yaml'

  hadolint:
    name: "Lint Dockerfile"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.sha256_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Run hadolint"
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          failure-threshold: error

  docker-build:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    needs: [hadolint, detect-docker-changes, detect-changes]
    if: needs.detect-docker-changes.outputs.docker-changed == 'true' && needs.detect-changes.outputs.docs_only != 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Free Disk Space"
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true      # ~14 GB
          remove_dotnet: true       # ~2.7 GB
          remove_haskell: true      # Minimal
          remove_tool_cache: false  # Keep Node.js since we need it
          remove_swap: true         # ~4 GB
          remove_codeql: true       # ~5.9 GB (we run CodeQL separately)
          use_rmz: true            # 3x faster deletion

      - name: "Clean up Docker"
        run: docker system prune -af --volumes

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Build Docker image"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: auto-mobile:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Run container structure tests"
        run: |
          IMAGE_NAME=auto-mobile:test bash scripts/docker/test_container.sh

      - name: "Test MCP stdio protocol"
        run: |
          set -e  # Exit on any error

          # Test that the server can receive and respond to MCP initialize
          echo "Testing MCP stdio protocol..."

          # MCP initialize request
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0.0"}}}'

          # Run container with timeout, capture both stdout and stderr
          # Give server 30 seconds to respond (more reasonable than 5)
          RESPONSE=$(echo "$INIT" | timeout 30 docker run --platform=linux/amd64 -i --rm auto-mobile:test 2>&1 | head -1)

          echo "Raw response: $RESPONSE"

          # Check if response is empty
          if [ -z "$RESPONSE" ]; then
            echo "ERROR: No response received from MCP server"
            echo "The server did not return any output within 30 seconds"
            exit 1
          fi

          # Validate JSON structure
          if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
            echo "ERROR: Response is not valid JSON"
            echo "Response: $RESPONSE"
            exit 1
          fi

          # Check for required JSON-RPC field
          if ! echo "$RESPONSE" | jq -e '.jsonrpc == "2.0"' >/dev/null 2>&1; then
            echo "ERROR: Missing or invalid 'jsonrpc' field"
            echo "Response: $RESPONSE"
            exit 1
          fi

          # Check for result field (MCP initialize response should have a result)
          if ! echo "$RESPONSE" | jq -e '.result' >/dev/null 2>&1; then
            echo "ERROR: Missing 'result' field in response"
            echo "Response: $RESPONSE"
            exit 1
          fi

          # Check for serverInfo in result
          if ! echo "$RESPONSE" | jq -e '.result.serverInfo' >/dev/null 2>&1; then
            echo "ERROR: Missing 'serverInfo' in result"
            echo "Response: $RESPONSE"
            exit 1
          fi

          # Check for capabilities in result
          if ! echo "$RESPONSE" | jq -e '.result.capabilities' >/dev/null 2>&1; then
            echo "ERROR: Missing 'capabilities' in result"
            echo "Response: $RESPONSE"
            exit 1
          fi

          # Verify serverInfo has expected fields
          SERVER_NAME=$(echo "$RESPONSE" | jq -r '.result.serverInfo.name')
          SERVER_VERSION=$(echo "$RESPONSE" | jq -r '.result.serverInfo.version')
          EXPECTED_VERSION=$(jq -r '.version' package.json)

          if [ "$SERVER_NAME" != "AutoMobile" ]; then
            echo "ERROR: Expected serverInfo.name='AutoMobile', got '$SERVER_NAME'"
            echo "Response: $RESPONSE"
            exit 1
          fi

          if [ "$SERVER_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "ERROR: Expected serverInfo.version='$EXPECTED_VERSION', got '$SERVER_VERSION'"
            echo "Response: $RESPONSE"
            exit 1
          fi

          # All checks passed!
          echo "✓ MCP stdio protocol test PASSED"
          echo "  - Valid JSON-RPC 2.0 response"
          echo "  - Contains serverInfo: name=$SERVER_NAME, version=$SERVER_VERSION"
          echo "  - Contains capabilities structure"
          echo "Test completed successfully!"

  docker-compose-test:
    name: "Test Docker Compose"
    runs-on: ubuntu-latest
    needs: [hadolint, detect-docker-changes, detect-changes]
    if: needs.detect-docker-changes.outputs.docker-changed == 'true' && needs.detect-changes.outputs.docs_only != 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - name: "Test docker-compose configuration"
        run: |
          docker compose config

      - name: "Build with docker-compose"
        run: |
          docker compose build auto-mobile

      - name: "Verify services are defined"
        run: |
          docker compose config --services | grep -q auto-mobile
          docker compose config --services | grep -q auto-mobile-dev

  # =============================================================================
  # MCP Context Thresholds
  # =============================================================================

  benchmark-context-thresholds:
    name: "Benchmark MCP Context Thresholds"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Run Context Threshold Benchmark"
        id: benchmark
        run: |
          # Create reports directory
          mkdir -p reports

          # Run benchmark and capture exit code
          bun run benchmark-context --output reports/context-benchmark.json || echo "FAILED=true" >> $GITHUB_ENV

          # Always preserve the report file even if benchmark failed
          exit 0

      - name: "Upload Benchmark Report"
        uses: actions/upload-artifact@v4.4.0
        if: always()
        with:
          name: context-benchmark-report
          path: reports/context-benchmark.json
          retention-days: 90

      - name: "Check Benchmark Result"
        if: always()
        run: |
          if [ "$FAILED" = "true" ]; then
            echo "::error::MCP context threshold benchmark failed - one or more thresholds were exceeded"
            cat reports/context-benchmark.json
            exit 1
          fi
          echo "::notice::MCP context threshold benchmark passed - all thresholds satisfied"

      - name: "Comment on PR with Results"
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'reports/context-benchmark.json';

            if (!fs.existsSync(reportPath)) {
              console.log('No benchmark report found');
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));

            const formatRow = (label, result) => {
              const status = result.passed ? '✅' : '❌';
              return `| ${label} | ${result.actual.toLocaleString()} | ${result.threshold.toLocaleString()} | ${result.usage}% | ${status} |`;
            };

            let body = '## MCP Context Threshold Benchmark\n\n';
            body += '| Category | Actual | Threshold | Usage | Status |\n';
            body += '|----------|--------|-----------|-------|--------|\n';
            body += formatRow('Tools', report.results.tools) + '\n';
            body += formatRow('Resources', report.results.resources) + '\n';
            body += formatRow('Resource Templates', report.results.resourceTemplates) + '\n';
            body += formatRow('**Total**', report.results.total) + '\n';

            if (report.violations.length > 0) {
              body += '\n### ⚠️ Threshold Violations\n\n';
              for (const violation of report.violations) {
                body += `- ${violation}\n`;
              }
            }

            body += `\n**Overall Status:** ${report.passed ? '✅ PASSED' : '❌ FAILED'}`;
            body += `\n\n_Generated at ${report.timestamp}_`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('MCP Context Threshold Benchmark')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # =============================================================================
  # MCP Tool Call Throughput
  # =============================================================================

  benchmark-tool-throughput:
    name: "Benchmark MCP Tool Throughput"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Run Tool Throughput Benchmark"
        id: benchmark
        run: |
          # Create reports directory
          mkdir -p reports

          # Run benchmark and capture exit code
          bun run benchmark-tools --output reports/tool-benchmark.json || echo "FAILED=true" >> $GITHUB_ENV

          # Always preserve the report file even if benchmark failed
          exit 0

      - name: "Upload Benchmark Report"
        uses: actions/upload-artifact@v4.4.0
        if: always()
        with:
          name: tool-benchmark-report
          path: reports/tool-benchmark.json
          retention-days: 90

      - name: "Check Benchmark Result"
        if: always()
        run: |
          if [ "$FAILED" = "true" ]; then
            echo "::error::MCP tool throughput benchmark failed - performance regressions detected"
            cat reports/tool-benchmark.json
            exit 1
          fi
          echo "::notice::MCP tool throughput benchmark passed - no regressions"

      - name: "Comment on PR with Results"
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'reports/tool-benchmark.json';

            if (!fs.existsSync(reportPath)) {
              console.log('No benchmark report found');
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));

            // Build summary table
            let body = '## MCP Tool Call Throughput Benchmark\n\n';
            body += `**Sample Size:** ${report.sampleSize} iterations per tool\n`;
            body += `**Total Duration:** ${(report.totalDuration / 1000).toFixed(2)}s\n`;
            body += `**Average Throughput:** ${report.summary.averageThroughput.toFixed(2)} ops/second\n\n`;

            // Group results by category
            const categories = [
              { name: 'Fast Operations', expectedLatency: '<100ms', tools: ['listDevices', 'getForegroundApp', 'pressButton'] },
              { name: 'Medium Operations', expectedLatency: '100ms-1s', tools: ['observe', 'tapOn', 'inputText', 'swipe'] },
              { name: 'Slow Operations', expectedLatency: '1s+', tools: ['launchApp', 'installApp'] }
            ];

            for (const category of categories) {
              const categoryResults = report.results.filter(r => category.tools.includes(r.toolName));
              if (categoryResults.length === 0) continue;

              body += `### ${category.name} (${category.expectedLatency})\n\n`;
              body += '| Tool | P50 | P95 | P99 | Mean | Success | Status |\n';
              body += '|------|-----|-----|-----|------|---------|--------|\n';

              for (const result of categoryResults) {
                const status = result.overallPassed === false ? '❌' : '✅';
                body += `| ${result.toolName} | ${result.p50.toFixed(1)}ms | ${result.p95.toFixed(1)}ms | ${result.p99.toFixed(1)}ms | ${result.mean.toFixed(1)}ms | ${result.successRate.toFixed(0)}% | ${status} |\n`;

                // Add regression details if failed
                if (result.thresholdChecks && result.overallPassed === false) {
                  for (const check of result.thresholdChecks.filter(c => !c.passed)) {
                    body += `| └─ ${check.metric.toUpperCase()} regression | ${check.actual.toFixed(2)}ms | | | ${check.threshold.toFixed(2)}ms | +${check.regression.toFixed(1)}% | |\n`;
                  }
                }
              }
              body += '\n';
            }

            // Add violations section if any
            if (report.violations.length > 0) {
              body += '### ⚠️ Performance Regressions\n\n';
              for (const violation of report.violations) {
                body += `- ${violation}\n`;
              }
              body += '\n';
            }

            body += `**Summary:** ${report.summary.passedTools}/${report.summary.totalTools} tools passed\n`;
            body += `**Overall Status:** ${report.passed ? '✅ PASSED' : '❌ FAILED'}\n\n`;
            body += `_Generated at ${report.timestamp}_`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('MCP Tool Call Throughput Benchmark')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # =============================================================================
  # MCP Startup Benchmark
  # =============================================================================

  benchmark-startup:
    name: "Benchmark MCP Startup"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true' && needs.detect-changes.outputs.sha256_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-auto-mobile-npm-package

      - name: "Run Startup Benchmark"
        id: benchmark
        run: |
          # Create reports directory
          mkdir -p reports

          # Run benchmark and capture exit code
          bun run benchmark-startup --compare benchmark/startup-baseline.json --output reports/startup-benchmark.json || echo "FAILED=true" >> $GITHUB_ENV

          # Always preserve the report file even if benchmark failed
          exit 0

      - name: "Upload Benchmark Report"
        uses: actions/upload-artifact@v4.4.0
        if: always()
        with:
          name: startup-benchmark-report
          path: reports/startup-benchmark.json
          retention-days: 90

      - name: "Check Benchmark Result"
        if: always()
        run: |
          if [ "$FAILED" = "true" ]; then
            echo "::error::MCP startup benchmark failed - regressions detected"
            cat reports/startup-benchmark.json
            exit 1
          fi
          echo "::notice::MCP startup benchmark passed - no regressions"

      - name: "Comment on PR with Results"
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'reports/startup-benchmark.json';

            if (!fs.existsSync(reportPath)) {
              console.log('No benchmark report found');
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));

            const formatMs = value => `${value.toFixed(1)}ms`;
            const formatBytes = value => `${(value / (1024 * 1024)).toFixed(1)}MB`;

            let body = '## MCP Startup Benchmark\\n\\n';

            if (report.results.mcpServer) {
              body += '### MCP Server (stdio)\\n\\n';
              body += '| Mode | Ready | First Tool Call | Heap Used |\\n';
              body += '|------|-------|-----------------|-----------|\\n';
              for (const run of report.results.mcpServer.runs || []) {
                const heap = run.memoryUsage?.heapUsed ? formatBytes(run.memoryUsage.heapUsed) : 'n/a';
                body += `| ${run.mode} | ${formatMs(run.timeToReadyMs)} | ${formatMs(run.timeToFirstToolCallMs)} | ${heap} |\\n`;
              }
              body += '\\n';

              const discovery = report.results.mcpServer.deviceDiscovery;
              if (discovery) {
                if (discovery.skipped) {
                  body += `Device discovery: skipped (${discovery.reason || 'no reason provided'})\\n\\n`;
                } else if (discovery.scenarios?.length) {
                  body += 'Device discovery scenarios:\\n';
                  for (const scenario of discovery.scenarios) {
                    body += `- ${scenario.name}: ${formatMs(scenario.durationMs)} (${scenario.deviceCount} device(s))\\n`;
                  }
                  body += '\\n';
                }
              }
            }

            if (report.results.daemon) {
              body += '### Daemon\\n\\n';
              body += '| Mode | Spawn | Ready | Responsive | Heap Used |\\n';
              body += '|------|-------|-------|------------|-----------|\\n';
              for (const run of report.results.daemon.runs || []) {
                const heap = run.memoryUsage?.heapUsed ? formatBytes(run.memoryUsage.heapUsed) : 'n/a';
                body += `| ${run.mode} | ${formatMs(run.spawnMs)} | ${formatMs(run.timeToReadyMs)} | ${formatMs(run.timeToResponsiveMs)} | ${heap} |\\n`;
              }
              body += '\\n';
            }

            if (report.comparisons?.regressions?.length) {
              const failures = report.comparisons.regressions.filter(r => !r.passed);
              if (failures.length > 0) {
                body += '### ⚠️ Regressions\\n\\n';
                for (const regression of failures) {
                  body += `- ${regression.metric}: ${regression.actual.toFixed(2)} > ${regression.threshold.toFixed(2)} (+${regression.regression.toFixed(1)}%)\\n`;
                }
                body += '\\n';
              }
            }

            if (report.skips?.length) {
              body += '### Skipped Checks\\n\\n';
              for (const skip of report.skips) {
                body += `- ${skip}\\n`;
              }
              body += '\\n';
            }

            body += `**Overall Status:** ${report.passed ? '✅ PASSED' : '❌ FAILED'}\\n`;
            body += `\\n_Generated at ${report.timestamp}_`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('MCP Startup Benchmark')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
