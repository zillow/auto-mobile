name: Update Changelog

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag name for changelog heading (e.g., v1.2.3)
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  update-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "current_tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "current_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update changelog
        env:
          CURRENT_TAG: ${{ steps.tag.outputs.current_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/changelog/update_changelog_from_issues.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE_BRANCH=$(gh repo view --json defaultBranchRef -q .defaultBranchRef.name)
          BRANCH="chore/update-changelog-${{ steps.tag.outputs.current_tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add CHANGELOG.md
          git commit -m "chore: update changelog for ${{ steps.tag.outputs.current_tag }}"
          git push --force-with-lease origin "$BRANCH"

          cat <<'BODY' > pr-body.txt
          ## Summary
          - Update `CHANGELOG.md` from closed issues since the last tag
          - Categorize by labels (features, bugs, other)

          ## Automation
          - Generated by `update_changelog` workflow
          BODY

          existing_pr=$(gh pr list --head "$BRANCH" --json url -q '.[0].url')
          if [ -n "$existing_pr" ]; then
            pr_url="$existing_pr"
          else
            pr_url=$(gh pr create \
              --title "Update changelog for ${{ steps.tag.outputs.current_tag }}" \
              --body-file pr-body.txt \
              --base "$BASE_BRANCH" \
              --head "$BRANCH")
          fi

          gh pr merge --auto --squash "$pr_url"
