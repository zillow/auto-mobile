name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New npm version (semver, without -SNAPSHOT)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  build-xctestservice-ipa:
    name: "Build XCTestService IPA"
    runs-on: macos-15
    outputs:
      sha256: ${{ steps.checksum.outputs.ipa_sha256 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "Select Xcode 16.2"
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: "Install XcodeGen"
        run: brew install xcodegen

      - name: "Install xcpretty"
        run: gem install xcpretty

      - name: "Build XCTestService IPA"
        id: checksum
        run: ./scripts/ios/xctestservice-create-ipa.sh --output /tmp/XCTestService.ipa

  prepare:
    runs-on: ubuntu-latest
    needs: build-xctestservice-ipa

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTO_MOBILE_PR_TOKEN }}

      - name: Install ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Bump versions
        run: bash scripts/versioning/bump-versions.sh --new-version "${{ inputs.version }}"

      - name: Update changelog
        env:
          CURRENT_TAG: v${{ inputs.version }}
          GH_TOKEN: ${{ secrets.AUTO_MOBILE_PR_TOKEN }}
        run: scripts/changelog/update_changelog_from_issues.sh

      - name: Build Accessibility Service APK
        uses: ./.github/actions/gradle-task-run
        with:
          gradle-tasks: ":accessibility-service:assembleDebug"
          gradle-project-directory: "android"
          gradle-home-directory: "~/.gradle/${{ github.job }}"
          reuse-configuration-cache: true
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          release-keystore-base64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          release-keystore-password: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          release-key-alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          release-key-password: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Calculate APK SHA256
        id: checksum
        run: |
          APK_PATH="android/accessibility-service/build/outputs/apk/debug/accessibility-service-debug.apk"
          SHA256=$(sha256sum "$APK_PATH" | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "APK SHA256: $SHA256"

      - name: Update release constants
        env:
          APK_SHA256_CHECKSUM: ${{ steps.checksum.outputs.sha256 }}
          XCTESTSERVICE_SHA256_CHECKSUM: ${{ needs.build-xctestservice-ipa.outputs.sha256 }}
        run: bash scripts/generate-release-constants.sh

      - name: Create pull request
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.AUTO_MOBILE_PR_TOKEN }}
          base: main
          branch: "chore/bump-versions-${{ inputs.version }}"
          delete-branch: true
          commit-message: "chore: bump versions to v${{ inputs.version }}"
          title: "chore: bump versions to v${{ inputs.version }}"
          body: |
            ## Summary
            - Bump versions to v${{ inputs.version }}
            - Update CHANGELOG.md from closed issues since the last tag
            - Refresh Accessibility Service APK SHA256 checksum
            - Refresh XCTestService IPA SHA256 checksum

            ## Automation
            - Generated by `prepare-release` workflow

      - name: Enable auto-merge
        if: steps.create_pr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.create_pr.outputs.pull-request-number }}
          merge-method: squash
