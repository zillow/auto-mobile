name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New npm version (semver, without -SNAPSHOT)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  build-ctrl-proxy-ios-ipa:
    uses: ./.github/workflows/build-ctrl-proxy-ios-ipa.yml

  build-control-proxy-apk:
    uses: ./.github/workflows/build-control-proxy-apk.yml
    secrets:
      GRADLE_ENCRYPTION_KEY: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

  prepare:
    runs-on: ubuntu-latest
    needs: [build-ctrl-proxy-ios-ipa, build-control-proxy-apk]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTO_MOBILE_PR_TOKEN }}

      - name: Install ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Bump versions
        run: bash scripts/versioning/bump-versions.sh --new-version "${{ inputs.version }}"

      - name: Update changelog
        env:
          CURRENT_TAG: v${{ inputs.version }}
          GH_TOKEN: ${{ secrets.AUTO_MOBILE_PR_TOKEN }}
        run: scripts/changelog/update_changelog_from_issues.sh

      - name: "Download CtrlProxy iOS IPA"
        uses: actions/download-artifact@v7
        with:
          name: ctrl-proxy-ios-ipa
          path: /tmp

      - name: "Download Accessibility Service APK"
        uses: actions/download-artifact@v7
        with:
          name: control-proxy-apk
          path: /tmp

      - name: Calculate SHA256 checksums
        id: checksum
        run: |
          APK_SHA256=$(sha256sum /tmp/control-proxy-debug.apk | cut -d' ' -f1)
          echo "apk_sha256=$APK_SHA256" >> "$GITHUB_OUTPUT"
          echo "APK SHA256: $APK_SHA256"

          IPA_SHA256=$(sha256sum /tmp/control-proxy.ipa | cut -d' ' -f1)
          echo "ipa_sha256=$IPA_SHA256" >> "$GITHUB_OUTPUT"
          echo "IPA SHA256: $IPA_SHA256"

      - name: Update release constants
        env:
          APK_SHA256_CHECKSUM: ${{ steps.checksum.outputs.apk_sha256 }}
          IOS_CTRL_PROXY_SHA256_CHECKSUM: ${{ steps.checksum.outputs.ipa_sha256 }}
        run: bash scripts/generate-release-constants.sh

      - name: Create pull request
        id: create_pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.AUTO_MOBILE_PR_TOKEN }}
          base: main
          branch: "chore/bump-versions-${{ inputs.version }}"
          delete-branch: true
          commit-message: "chore: bump versions to v${{ inputs.version }}"
          title: "chore: bump versions to v${{ inputs.version }}"
          body: |
            ## Summary
            - Bump versions to v${{ inputs.version }}
            - Update CHANGELOG.md from closed issues since the last tag
            - Refresh Accessibility Service APK SHA256 checksum
            - Refresh CtrlProxy iOS IPA SHA256 checksum

            ## Automation
            - Generated by `prepare-release` workflow

      - name: Enable auto-merge
        if: steps.create_pr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.create_pr.outputs.pull-request-number }}
          merge-method: squash
