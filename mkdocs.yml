# pip3 install mkdocs mkdocs-material
# mkdocs serve
# mkdocs gh-deploy

site_name: AutoMobile
repo_name: AutoMobile
repo_url: https://github.com/kaeawc/auto-mobile
site_description: "Mobile interaction automation"
site_author: Jason Pearson
remote_branch: gh-pages
use_directory_urls: true

copyright: 'Copyright &copy; 2025-2026 Jason Pearson'

plugins:
  - search
  - mermaid2:
      version: 10.0.2

theme:
  name: 'material'
  favicon: img/favicon.ico
  logo: img/auto_mobile_sticker_splash.png
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: 'white'
      accent: 'green'
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: 'black'
      accent: 'green'
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: 'Inter'
    code: 'Fira Code'
  features:
    - content.code.copy
    - content.code.select

markdown_extensions:
  - smarty
  - codehilite:
      guess_lang: false
  - footnotes
  - meta
  - toc:
      permalink: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.emoji
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - attr_list
  - md_in_html

nav:
  - 'Overview': index.md
  - 'Install':
      - 'Overview': install/overview.md
      - 'AI Agents': install/ai-agents.md
      - 'Platform Specific':
          - 'Android': install/plat/android.md
          - 'iOS': install/plat/ios.md
  - 'Using AutoMobile':
      - 'Overview': using/index.md
      - 'UX Exploration': using/ux-exploration.md
      - 'Reproducing Bugs': using/reproducting-bugs.md
      - 'Performance Analysis':
          - 'Startup': using/perf-analysis/startup.md
          - 'Screen Transition': using/perf-analysis/screen-transition.md
          - 'Scroll Framerate': using/perf-analysis/scroll-framerate.md
      - 'Accessibility':
          - 'Contrast': using/a11y/contrast.md
          - 'Tap Targets': using/a11y/tap-targets.md
      - 'UI Tests': using/ui-tests.md
  - 'Design Docs':
      - 'Overview': design-docs/index.md
      - 'MCP':
          - 'Overview': design-docs/mcp/index.md
          - 'Actions': design-docs/mcp/actions.md
          - 'Observation': design-docs/mcp/observation.md
          - 'Interaction Loop': design-docs/mcp/interaction-loop.md
          - 'Daemon': design-docs/mcp/daemon.md
          - 'Navigation Graph': design-docs/mcp/navigation-graph.md
          - 'Feature Flags': design-docs/mcp/feature-flags.md
          - 'Resources': design-docs/mcp/resources.md
      - 'Platform Specific':
          - 'Android':
            - 'Overview': design-docs/plat/android/index.md
            - 'Accessibility Service': design-docs/plat/android/accessibility-service.md
            - 'AutoMobile SDK': design-docs/plat/android/auto-mobile-sdk.md
            - 'JUnitRunner': design-docs/plat/android/junitrunner.md
            - 'IDE Plugin':
              - 'Overview': design-docs/plat/android/ide-plugin/overview.md
              - 'Test Recording': design-docs/plat/android/ide-plugin/test-recording.md
              - 'Navigation Graph Render': design-docs/plat/android/ide-plugin/test-recording.md
              - 'Control Feature Flags': design-docs/plat/android/ide-plugin/test-recording.md
            - 'Work Profiles': design-docs/plat/android/work-profiles.md
          - 'iOS':
            - 'Overview': design-docs/plat/ios/index.md
  - 'Contributing':
      - 'How': contributing/index.md
      - 'Local Development': contributing/local-development.md
      - 'GitHub Discussions': https://github.com/kaeawc/auto-mobile/discussions
  - 'FAQ': faq.md
  - 'Change Log': changelog.md
