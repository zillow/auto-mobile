# SwiftLint Configuration
# https://github.com/realm/SwiftLint

# Paths to lint
included:
  - ios

# Paths to exclude
excluded:
  - ios/**/build
  - ios/**/DerivedData
  - ios/**/.build
  - ios/**/Pods
  - ios/**/Carthage
  - ios/**/.swiftpm

# Disable rules that overlap with SwiftFormat (formatting is handled by SwiftFormat)
disabled_rules:
  # Formatting rules (handled by SwiftFormat)
  - opening_brace
  - closing_brace
  - colon
  - comma
  - leading_whitespace
  - trailing_whitespace
  - trailing_newline
  - trailing_semicolon
  - statement_position
  - return_arrow_whitespace
  - vertical_whitespace
  - void_return
  - sorted_imports
  - closure_spacing
  - trailing_comma  # SwiftFormat uses --commas always

  # Optional rules we don't want to enforce
  - line_length  # SwiftFormat handles line wrapping
  - file_length  # Can be overly restrictive for valid large files
  - type_body_length  # Can be overly restrictive
  - function_body_length  # Can be overly restrictive
  - cyclomatic_complexity  # Can be too restrictive
  - function_parameter_count  # Some APIs legitimately need many parameters

# Opt-in rules (not enabled by default)
# Only enable rules that add clear value without being too noisy
opt_in_rules:
  - array_init
  - closure_end_indentation
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_none_name
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - explicit_init
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - overridden_super_call
  - override_in_extension
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - yoda_condition

# Rule configurations
identifier_name:
  min_length:
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y
    - z
    - i
    - j
    - k
    - n
    - ip
    - fd
    - ws
    - lhs
    - rhs
    - x1
    - y1
    - x2
    - y2

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60
  excluded:
    - ID

nesting:
  type_level: 2
  function_level: 3

large_tuple:
  warning: 3
  error: 4

# Reporter type (xcode, json, csv, checkstyle, codeclimate, junit, html, emoji, sonarqube, markdown, github-actions-logging)
reporter: "xcode"
