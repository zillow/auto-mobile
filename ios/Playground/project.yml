name: Playground
options:
  bundleIdPrefix: dev.jasonpearson.automobile
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

configFiles:
  Debug: Configurations/Debug.xcconfig
  Release: Configurations/Release.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  Playground:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "*.xcassets"
      - path: Sources/Theme
      - path: Sources/Assets.xcassets
        type: folder
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: dev.jasonpearson.automobile.Playground
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO

schemes:
  Playground:
    build:
      targets:
        Playground: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
