name: Multi-Device Payment Example with Critical Section
description: |
  Demonstrates using criticalSection to serialize payment processing across devices.
  Both devices perform setup in parallel, then wait at a barrier before processing
  payments one at a time to avoid race conditions.

steps:
  # Parallel setup on both devices
  - tool: launchApp
    params:
      device: A
      appId: com.example.paymentapp
    label: Launch app on device A

  - tool: launchApp
    params:
      device: B
      appId: com.example.paymentapp
    label: Launch app on device B

  - tool: tapOn
    params:
      device: A
      text: Login
    label: Navigate to login on device A

  - tool: tapOn
    params:
      device: B
      text: Login
    label: Navigate to login on device B

  # Critical section - both devices wait here, then execute serially
  - tool: criticalSection
    params:
      device: A
      lock: payment-processing
      deviceCount: 2
      timeout: 30000
      steps:
        # Device A's payment steps (executed first or second, depending on barrier)
        - tool: tapOn
          params:
            device: A
            text: Make Payment
          label: Initiate payment on device A

        - tool: inputText
          params:
            device: A
            text: "100.00"
            resourceId: com.example.paymentapp:id/amount
          label: Enter payment amount on device A

        - tool: tapOn
          params:
            device: A
            text: Confirm
          label: Confirm payment on device A

        - tool: observe
          params:
            device: A
          label: Verify payment success on device A
    label: Process payment on device A (serialized)

  - tool: criticalSection
    params:
      device: B
      lock: payment-processing
      deviceCount: 2
      timeout: 30000
      steps:
        # Device B's payment steps (executed first or second, depending on barrier)
        - tool: tapOn
          params:
            device: B
            text: Make Payment
          label: Initiate payment on device B

        - tool: inputText
          params:
            device: B
            text: "200.00"
            resourceId: com.example.paymentapp:id/amount
          label: Enter payment amount on device B

        - tool: tapOn
          params:
            device: B
            text: Confirm
          label: Confirm payment on device B

        - tool: observe
          params:
            device: B
          label: Verify payment success on device B
    label: Process payment on device B (serialized)

  # Continue with parallel verification
  - tool: tapOn
    params:
      device: A
      text: View History
    label: Check transaction history on device A

  - tool: tapOn
    params:
      device: B
      text: View History
    label: Check transaction history on device B

metadata:
  createdAt: "2026-01-07"
  version: "1.0"
  description: |
    This example demonstrates the criticalSection tool for multi-device coordination.

    Key points:
    1. Both devices register with the same lock name ("payment-processing")
    2. Both devices specify deviceCount: 2 (total devices that will reach the barrier)
    3. Both devices wait at the barrier until BOTH have arrived
    4. Once both arrive, they execute their steps serially (one at a time)
    5. The order of execution is determined by which device acquires the lock first
    6. After the critical section, parallel execution resumes

    Use cases:
    - Serializing payment/transaction processing to avoid race conditions
    - Ensuring database writes happen in order across devices
    - Coordinating resource access (e.g., camera, microphone permissions)
    - Synchronizing state changes that must not interleave
